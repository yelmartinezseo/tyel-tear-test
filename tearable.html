<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Special+Gothic+Expanded+One&display=swap" rel="stylesheet">
    <title>T-Yel · Calendario</title>
    <!-- Rutas correctas: tearable/assets/ no ./assets/ -->
    <script type="module" crossorigin src="./tearable/assets/index-C9ovOD5n.js"></script>
    <link rel="stylesheet" crossorigin href="./tearable/assets/index-zhVzAvgK.css">
    <style>
      #tyel-footer {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        height: 100px;
        background: #ffffff;
        border-top: 1px dashed rgba(0,0,0,0.15);
        display: flex;
        align-items: center;
        justify-content: space-around;
        padding: 0 5%;
        z-index: 9999;
        box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
        pointer-events: none;
      }

      .tyel-btn {
        display: flex; flex-direction: column;
        align-items: center; gap: 5px;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        user-select: none; flex: 1;
        pointer-events: all;
      }

      .tyel-btn-circle {
        width: 48px; height: 48px;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-size: 20px; color: #fff; font-weight: 700;
        box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        transition: transform 0.12s ease;
      }

      .tyel-btn:active .tyel-btn-circle { transform: scale(0.92); }

      .tyel-btn-label {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 12px; font-weight: 700; color: #3A3A3A;
      }

      #tyel-overlay {
        position: fixed; inset: 0;
        background: rgba(0,0,0,0.3);
        opacity: 0;
        pointer-events: none;
        z-index: 10000;
        transition: opacity 0.25s ease;
      }

      #tyel-overlay.show {
        opacity: 1;
        pointer-events: all;
      }

      .tyel-panel {
        position: fixed;
        bottom: -110%; left: 0; right: 0;
        background: #ffffff;
        border-radius: 20px 20px 0 0;
        box-shadow: 0 -8px 32px rgba(0,0,0,0.18);
        z-index: 10001;
        padding: 20px 24px 40px;
        transition: bottom 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        pointer-events: all;
      }

      .tyel-panel.open { bottom: 0; }

      .tyel-panel-handle {
        width: 36px; height: 4px;
        background: #D1D1D6; border-radius: 2px;
        margin: 0 auto 16px; cursor: pointer;
      }

      .tyel-panel-title {
        font-size: 17px; font-weight: 700;
        color: #1C1C1E; margin-bottom: 16px;
      }

      .tyel-panel-close {
        position: absolute; top: 16px; right: 20px;
        width: 28px; height: 28px; border-radius: 50%;
        background: #F2F2F7; border: none; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        font-size: 14px; color: #636366;
      }

      .tyel-panel-textarea {
        width: 100%; min-height: 100px;
        border: 1.5px solid #E5E5EA; border-radius: 10px;
        padding: 12px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 16px; color: #1C1C1E;
        resize: none; outline: none; background: #F9F9F9;
        box-sizing: border-box;
      }

      .tyel-panel-textarea:focus { border-color: #7B9EBE; background: #fff; }
      .tyel-panel-textarea::placeholder { color: #AEAEB2; }

      .tyel-panel-save {
        width: 100%; margin-top: 12px; padding: 14px;
        background: #5884c1; color: #fff; border: none;
        border-radius: 12px; font-size: 16px; font-weight: 700;
        cursor: pointer; box-sizing: border-box;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .tyel-color-grid {
        display: grid; grid-template-columns: repeat(5, 1fr);
        gap: 14px; margin-top: 8px;
      }

      .tyel-color-swatch {
        aspect-ratio: 1; border-radius: 50%; cursor: pointer;
        border: 3px solid transparent;
        box-shadow: 0 2px 6px rgba(0,0,0,0.12);
        transition: transform 0.12s, border-color 0.12s;
      }

      .tyel-color-swatch:active { transform: scale(0.88); }
      .tyel-color-swatch.selected { border-color: #1C1C1E; }

      .tyel-emoji-grid {
        display: grid; grid-template-columns: repeat(6, 1fr);
        gap: 8px; margin-top: 8px;
      }

      .tyel-emoji-btn {
        aspect-ratio: 1; display: flex;
        align-items: center; justify-content: center;
        font-size: 24px; background: #F2F2F7;
        border-radius: 10px; cursor: pointer;
      }

      #tyel-toast {
        position: fixed; bottom: 116px; left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: #1C1C1E; color: #fff;
        padding: 10px 20px; border-radius: 100px;
        font-size: 13px; font-weight: 600; opacity: 0;
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        z-index: 10002; white-space: nowrap; pointer-events: none;
        font-family: -apple-system, sans-serif;
      }

      #tyel-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="tyel-overlay"></div>

    <div id="tyel-footer">
      <div class="tyel-btn" onclick="tyelOpen('nota')">
        <div class="tyel-btn-circle" style="background:#d7927c;">✎</div>
        <span class="tyel-btn-label">Nota</span>
      </div>
      <div class="tyel-btn" onclick="tyelOpen('color')">
        <div class="tyel-btn-circle" style="background:#a0bdb8;">◈</div>
        <span class="tyel-btn-label">Color</span>
      </div>
      <div class="tyel-btn" onclick="tyelOpen('emoji')">
        <div class="tyel-btn-circle" style="background:#b3afc6;">☺</div>
        <span class="tyel-btn-label">Emoji</span>
      </div>
      <div class="tyel-btn" onclick="tyelOpen('volver')">
        <div class="tyel-btn-circle" style="background:#5884c1;">↺</div>
        <span class="tyel-btn-label">Volver</span>
      </div>
    </div>

    <div class="tyel-panel" id="panel-nota">
      <div class="tyel-panel-handle" onclick="tyelCloseAll()"></div>
      <button class="tyel-panel-close" onclick="tyelCloseAll()">✕</button>
      <div class="tyel-panel-title" id="panel-nota-title">Nota del día</div>
      <textarea class="tyel-panel-textarea" id="nota-input"
        placeholder="Escribe tu nota aquí..." maxlength="280"></textarea>
      <button class="tyel-panel-save" onclick="tyelSaveNota()">Guardar</button>
    </div>

    <div class="tyel-panel" id="panel-color">
      <div class="tyel-panel-handle" onclick="tyelCloseAll()"></div>
      <button class="tyel-panel-close" onclick="tyelCloseAll()">✕</button>
      <div class="tyel-panel-title">Resaltar día</div>
      <div class="tyel-color-grid" id="color-grid"></div>
    </div>

    <div class="tyel-panel" id="panel-emoji">
      <div class="tyel-panel-handle" onclick="tyelCloseAll()"></div>
      <button class="tyel-panel-close" onclick="tyelCloseAll()">✕</button>
      <div class="tyel-panel-title">Añadir emoji</div>
      <div class="tyel-emoji-grid" id="emoji-grid"></div>
    </div>

    <div id="tyel-toast"></div>

    <script>
    const MONTH_NAMES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
      'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    const COLORS = ['#FFD60A','#FF9F0A','#FF6B6B','#FF2D55','#BF5AF2',
      '#5856D6','#007AFF','#34C759','#00C7BE','#636366'];
    const EMOJIS = ['⭐','❤️','🎯','✅','⚠️','💡','🎉','📅','🔔','🎂','💬','✏️',
      '🏃','💪','🍎','☕','🌙','🌟'];

    let calData = JSON.parse(localStorage.getItem('tyel_data') || '{}');
    let selectedDay=null, selectedMonth=null, selectedYear=null;

    document.getElementById('tyel-overlay').addEventListener('click', tyelCloseAll);
    document.getElementById('tyel-overlay').addEventListener('touchend', e => {
      e.preventDefault(); tyelCloseAll();
    }, {passive:false});

    (function(){
      const cg=document.getElementById('color-grid');
      COLORS.forEach(c=>{
        const sw=document.createElement('div');
        sw.className='tyel-color-swatch'; sw.style.background=c;
        sw.onclick=()=>tyelSaveColor(c); cg.appendChild(sw);
      });
      const eg=document.getElementById('emoji-grid');
      EMOJIS.forEach(em=>{
        const btn=document.createElement('div');
        btn.className='tyel-emoji-btn'; btn.textContent=em;
        btn.onclick=()=>tyelSaveEmoji(em); eg.appendChild(btn);
      });
    })();

    function tyelOpen(type){
      tyelCloseAll();
      const now=new Date();
      selectedDay=now.getDate(); selectedMonth=now.getMonth(); selectedYear=now.getFullYear();
      if(type==='nota'){
        const key=tyelKey();
        document.getElementById('nota-input').value=(calData[key]||{}).nota||'';
        document.getElementById('panel-nota-title').textContent=
          `Nota · ${selectedDay} de ${MONTH_NAMES[selectedMonth]} ${selectedYear}`;
        document.getElementById('panel-nota').classList.add('open');
        setTimeout(()=>document.getElementById('nota-input').focus(),400);
      } else if(type==='color'){
        document.getElementById('panel-color').classList.add('open');
      } else if(type==='emoji'){
        document.getElementById('panel-emoji').classList.add('open');
      } else if(type==='volver'){
        tyelToast('Mes recuperado ↺'); return;
      }
      requestAnimationFrame(()=>document.getElementById('tyel-overlay').classList.add('show'));
    }

    function tyelCloseAll(){
      document.querySelectorAll('.tyel-panel').forEach(p=>p.classList.remove('open'));
      document.getElementById('tyel-overlay').classList.remove('show');
    }

    function tyelKey(){
      return `${selectedYear}-${String(selectedMonth+1).padStart(2,'0')}-${String(selectedDay).padStart(2,'0')}`;
    }

    function tyelSaveNota(){
      const key=tyelKey(), val=document.getElementById('nota-input').value.trim();
      if(!calData[key])calData[key]={};
      if(val)calData[key].nota=val; else delete calData[key].nota;
      localStorage.setItem('tyel_data',JSON.stringify(calData));
      tyelCloseAll(); tyelToast('Nota guardada ✓');
    }

    function tyelSaveColor(color){
      const key=tyelKey();
      if(!calData[key])calData[key]={};
      calData[key].color=color;
      localStorage.setItem('tyel_data',JSON.stringify(calData));
      tyelCloseAll(); tyelToast('Color aplicado ✓');
    }

    function tyelSaveEmoji(emoji){
      const key=tyelKey();
      if(!calData[key])calData[key]={};
      calData[key].emoji=emoji;
      localStorage.setItem('tyel_data',JSON.stringify(calData));
      tyelCloseAll(); tyelToast(`${emoji} guardado ✓`);
    }

    function tyelToast(msg){
      const t=document.getElementById('tyel-toast');
      t.textContent=msg; t.classList.add('show');
      setTimeout(()=>t.classList.remove('show'),2200);
    }
    </script>
  </body>
</html>
