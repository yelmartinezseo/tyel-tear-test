<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>T-Yel</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#1a1714;font-family:'DM Sans',sans-serif;user-select:none}
#wrap{width:100vw;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ANILLAS */
#top-zone{flex-shrink:0;height:52px;position:relative;z-index:60;background:#252220;box-shadow:0 3px 14px rgba(0,0,0,.7)}
#rings{position:absolute;inset:0;display:flex;align-items:center;justify-content:space-around;padding:0 30px;z-index:62;pointer-events:none}
.ring{width:26px;height:26px;border-radius:50%;border:4px solid #6a6560;background:radial-gradient(circle at 35% 35%,#5a5550,#2e2a28);box-shadow:inset 0 2px 5px rgba(0,0,0,.6),0 2px 8px rgba(0,0,0,.5);position:relative;flex-shrink:0}
.ring::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:9px;height:9px;border-radius:50%;background:#4a4844;box-shadow:inset 0 1px 3px rgba(0,0,0,.7)}
#acc-stack{position:absolute;inset:0;pointer-events:none;z-index:58;overflow:hidden}
.acc-strip{position:absolute;left:0;right:0;top:0;height:52px;display:flex;align-items:center;padding:0 20px;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:rgba(255,255,255,.8)}

/* STAGE */
#stage{flex:1;position:relative;overflow:hidden;min-height:0}
.page{position:absolute;inset:0;display:flex;flex-direction:column}
#pback{z-index:1}
#pfront{z-index:2}
#tc{position:absolute;inset:0;z-index:6;touch-action:none}

/* CALENDARIO */
.ph{padding:18px 22px 28px;flex-shrink:0}
.ph h1{font-family:'Syne',sans-serif;font-size:clamp(34px,9.5vw,80px);font-weight:800;color:rgba(255,255,255,.94);line-height:1;letter-spacing:-2px}
.ph .yr{font-family:'Syne',sans-serif;font-size:12px;color:rgba(255,255,255,.5);margin-top:3px}
.pgrid{flex:1;padding:6px 10px 2px;overflow:hidden}
.grid{display:grid;grid-template-columns:repeat(7,1fr)}
.ch{text-align:center;font-family:'Syne',sans-serif;font-size:clamp(11px,2.8vw,20px);font-weight:700;color:#7b7470;padding:2px 0 6px}
.ch.wk{color:var(--ac)}
.dc{padding:0;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:46px;gap:2px}
.dc.emp{pointer-events:none}
.dn{font-family:'Syne',sans-serif;font-size:clamp(15px,3.8vw,36px);font-weight:700;color:#1a1612;line-height:1;display:flex;align-items:center;justify-content:center}
.dc.wk .dn{color:var(--ac)}
.dc.tod .dn{background:var(--ac);color:#fff;border-radius:50%;width:clamp(24px,4.8vw,40px);height:clamp(24px,4.8vw,40px);font-size:clamp(11px,2.8vw,24px)}
.dc.sel{outline:2px solid var(--ac);outline-offset:-1px;border-radius:8px}
.dm{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;min-height:8px}
.dot-nota{width:6px;height:6px;border-radius:50%;background:#fff;border:1.5px solid var(--ac);flex-shrink:0}
.em{font-size:9px;line-height:1}

/* BAR */
#bar{flex-shrink:0;background:#f4f0ed;display:flex;align-items:center;justify-content:space-around;padding:10px 8px 16px;border-top:1px solid rgba(0,0,0,.09);z-index:10}
.bb{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:pointer;padding:4px 10px;border-radius:12px}
.bb:active{background:rgba(0,0,0,.07)}
.bi{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;font-style:normal}
.bl{font-size:11px;font-weight:500;color:#7b7470}

/* PANELS */
#ov{display:none;position:absolute;inset:0;background:rgba(8,6,4,.56);z-index:20}
#ov.on{display:block}
.panel{position:absolute;bottom:-110%;left:0;right:0;background:#faf8f6;border-radius:22px 22px 0 0;padding:16px 18px 28px;z-index:30;transition:bottom .34s cubic-bezier(.22,.8,.22,1);max-height:82%;overflow-y:auto}
.panel.open{bottom:0}
.phan{width:38px;height:4px;background:rgba(0,0,0,.14);border-radius:2px;margin:0 auto 16px}
.ph-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.ptit{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#999}
.pcl{background:#e8e4e0;border:none;border-radius:50%;width:30px;height:30px;font-size:16px;cursor:pointer;color:#444;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dsr{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:10px 12px;background:#f0ece8;border-radius:12px}
.dsl{font-size:12px;color:#888;font-weight:500;flex-shrink:0}
.dsv{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#1a1612;flex:1}
.dsb{display:flex;gap:6px}
.dsb button{background:#fff;border:1px solid rgba(0,0,0,.12);border-radius:8px;padding:5px 10px;font-size:12px;font-weight:500;cursor:pointer;color:#444}
textarea{width:100%;min-height:90px;border:1.5px solid rgba(0,0,0,.12);border-radius:10px;padding:10px 12px;font-size:14px;color:#1a1612;background:#fff;resize:none;outline:none;font-family:'DM Sans',sans-serif}
textarea:focus{border-color:var(--ac)}
.sbtn{width:100%;margin-top:10px;padding:13px;background:var(--ac);color:#fff;border:none;border-radius:10px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer}
.xbtn{width:100%;margin-top:8px;padding:11px;background:rgba(0,0,0,.06);color:var(--ac);border:none;border-radius:10px;font-size:13px;cursor:pointer}
.cgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:12px}
.sw{border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform .12s,border-color .12s;aspect-ratio:1;max-width:46px;width:100%;margin:0 auto;display:block}
.sw:active{transform:scale(1.12)}
.sw.sel{border-color:#1a1612}
.egrid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.eb{background:rgba(0,0,0,.04);border:none;border-radius:10px;padding:9px 4px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.eb:active{background:rgba(0,0,0,.12)}
.cur-em{text-align:center;font-size:28px;margin-bottom:10px;min-height:36px}
#toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(12px);background:#1a1612;color:#fff;padding:8px 18px;border-radius:40px;font-size:12px;font-weight:500;opacity:0;transition:opacity .2s,transform .2s;z-index:200;pointer-events:none;white-space:nowrap}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
#si{position:absolute;top:8px;right:10px;background:rgba(0,0,0,.55);color:#fff;padding:5px 12px;border-radius:30px;font-size:11px;font-weight:700;z-index:7;pointer-events:none;opacity:0;transition:opacity .22s}
#si.on{opacity:1}
</style>
</head>
<body>
<div id="wrap">
  <div id="top-zone">
    <div id="acc-stack"></div>
    <div id="rings">
      <div class="ring"></div><div class="ring"></div><div class="ring"></div>
      <div class="ring"></div><div class="ring"></div><div class="ring"></div>
      <div class="ring"></div>
    </div>
  </div>
  <div id="stage">
    <div class="page" id="pback"></div>
    <div class="page" id="pfront"></div>
    <canvas id="tc"></canvas>
    <div id="ov" onclick="closeAll()"></div>
    <div id="si"></div>
    <div class="panel" id="pnota">
      <div class="phan"></div>
      <div class="ph-row"><div class="ptit" id="ntit">Nota</div><button class="pcl" onclick="closeAll()">✕</button></div>
      <div class="dsr"><span class="dsl">Día:</span><span class="dsv" id="nday">—</span><div class="dsb"><button onclick="shiftDay('nota',-1)">‹</button><button onclick="shiftDay('nota',1)">›</button></div></div>
      <textarea id="ntxt" placeholder="Escribe tu nota..."></textarea>
      <button class="sbtn" onclick="saveNota()">Guardar nota</button>
      <button class="xbtn" onclick="deleteNota()">Borrar nota de este día</button>
    </div>
    <div class="panel" id="pcolor">
      <div class="phan"></div>
      <div class="ph-row"><div class="ptit" id="ctit">Color</div><button class="pcl" onclick="closeAll()">✕</button></div>
      <div class="dsr"><span class="dsl">Día:</span><span class="dsv" id="cday">—</span><div class="dsb"><button onclick="shiftDay('color',-1)">‹</button><button onclick="shiftDay('color',1)">›</button></div></div>
      <div class="cgrid" id="cgrid"></div>
      <button class="xbtn" onclick="clearColor()">Quitar color de este día</button>
    </div>
    <div class="panel" id="pemoji">
      <div class="phan"></div>
      <div class="ph-row"><div class="ptit" id="etit">Emoji</div><button class="pcl" onclick="closeAll()">✕</button></div>
      <div class="dsr"><span class="dsl">Día:</span><span class="dsv" id="eday">—</span><div class="dsb"><button onclick="shiftDay('emoji',-1)">‹</button><button onclick="shiftDay('emoji',1)">›</button></div></div>
      <div class="cur-em" id="curem"></div>
      <div class="egrid" id="egrid"></div>
      <button class="xbtn" style="margin-top:10px" onclick="clearEmoji()">Quitar emoji de este día</button>
    </div>
    <div id="toast"></div>
  </div>
  <div id="bar">
    <button class="bb" onclick="openP('nota')"><i class="bi" style="background:#c9837a">✎</i><span class="bl">Nota</span></button>
    <button class="bb" onclick="openP('color')"><i class="bi" style="background:#7ab4c9">◈</i><span class="bl">Color</span></button>
    <button class="bb" onclick="openP('emoji')"><i class="bi" style="background:#9b7ac9">☺</i><span class="bl">Emoji</span></button>
    <button class="bb" onclick="goBack()"><i class="bi" style="background:#7ac99b">↺</i><span class="bl">Volver</span></button>
  </div>
</div>
<script>
'use strict';

/* ══ PALETA ══ */
const MP=['#c9837a','#7a9db5','#8fa07a','#b59a7a','#c9837a','#7ab5a0','#9b8fb5','#b5a07a','#7a9db5','#b57a8f','#8a9b7a','#7a8fb5'];
const GP=['#d4c8c4','#c4cdd4','#c8d0c4','#d4ccc4','#d4c8c4','#c4d0cc','#ccc8d4','#d4ccc4','#c4cdd4','#d4c4cc','#caccd4','#c4cad4'];

const MN=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DN=['D','L','M','X','J','V','S'];
const DNS=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
const SW=['#FFD93D','#FF9A3C','#FF7878','#FF4C6A','#C47ED6','#7A6FD8','#5B9BF0','#3AC569','#2BD4C4','#888888'];
const EM=['⭐','❤️','🎯','✅','⚠️','💡','🎉','📅','🔔','🎂','💬','✏️','🏃','💪','🍎','☕','🌙','✨','🌱','📌','🔥','🎵','📝','🏆'];

const now=new Date();
let cY=now.getFullYear(),cM=now.getMonth();
let pD={n:now.getDate(),c:now.getDate(),e:now.getDate()};
let pY={n:cY,c:cY,e:cY},pM={n:cM,c:cM,e:cM};
let hist=[],accM=[],cal={};
try{cal=JSON.parse(localStorage.getItem('tyc8')||'{}')}catch(e){}
const persist=()=>{try{localStorage.setItem('tyc8',JSON.stringify(cal))}catch(e){}};
const K=(y,m,d)=>`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const dIn=(y,m)=>new Date(y,m+1,0).getDate();
const fD=(y,m,d)=>`${DNS[new Date(y,m,d).getDay()]} ${d} de ${MN[m]} ${y}`;
function setAc(col){document.documentElement.style.setProperty('--ac',col);}

/* ══ DOM CALENDAR ══ */
function buildCal(y,m,el){
  const fd=new Date(y,m,1).getDay(),nd=dIn(y,m);
  const isnow=y===now.getFullYear()&&m===now.getMonth();
  const col=MP[m],gc=GP[m];
  let h=`<div class="ph" style="background:${col}"><h1>${MN[m]}</h1><div class="yr">${y}</div></div>`;
  h+=`<div class="pgrid" style="background:${gc}"><div class="grid">`;
  DN.forEach((d,i)=>h+=`<div class="ch${i===0||i===6?' wk':''}">${d}</div>`);
  for(let i=0;i<fd;i++)h+=`<div class="dc emp"></div>`;
  for(let d=1;d<=nd;d++){
    const dow=(fd+d-1)%7,wk=dow===0||dow===6,tod=isnow&&d===now.getDate();
    const k=K(y,m,d),e=cal[k]||{};
    const bg=e.color?` style="background:${e.color}55"`:'';
    let mk='';
    if(e.nota)mk+=`<span class="dot-nota"></span>`;
    if(e.emoji)mk+=`<span class="em">${e.emoji}</span>`;
    h+=`<div class="${['dc',wk&&'wk',tod&&'tod'].filter(Boolean).join(' ')}"${bg} data-d="${d}" data-y="${y}" data-m="${m}"><div class="dn">${d}</div><div class="dm">${mk}</div></div>`;
  }
  h+=`</div></div>`;el.innerHTML=h;
}
function build(){
  const pm=cM===0?11:cM-1,py=cM===0?cY-1:cY;
  buildCal(py,pm,document.getElementById('pback'));
  buildCal(cY,cM,document.getElementById('pfront'));
  setAc(MP[cM]);
  startCloth();
}

/* ══ CABECERAS ACUMULADAS ══ */
function pushAcc(y,m){accM.push({y,m,col:MP[m]});renderAcc();}
function popAcc(){if(accM.length)accM.pop();renderAcc();}
function renderAcc(){
  const el=document.getElementById('acc-stack');el.innerHTML='';
  accM.slice(-4).forEach((it,i,arr)=>{
    const d=document.createElement('div');d.className='acc-strip';
    const offset=(arr.length-1-i)*4;
    d.style.cssText=`background:${it.col};transform:translateY(${offset}px);opacity:${0.4+i*0.15};z-index:${56+i}`;
    d.textContent=`${MN[it.m]} ${it.y}`;
    el.appendChild(d);
  });
}

/* ══════════════════════════════════════════════
   CLOTH PHYSICS — arquitectura exacta del original dissimulate
   Fuente: codepen.io/dissimulate — tearable cloth
══════════════════════════════════════════════ */
const canvas=document.getElementById('tc');
const ctx=canvas.getContext('2d');

/* parámetros idénticos al original */
const ACCURACY=5;      /* iteraciones de constraints por frame */
const GRAVITY=1200;    /* fuerza gravitatoria */
const FRICTION=0.99;
const TEAR_DIST=60;    /* distancia absoluta de rotura en px */
const BOUNCE=0.5;

/* espaciado de la malla en px — fijo, no relativo */
const SPACING=12;

const mouse={
  cut:12,        /* radio de corte */
  influence:36,  /* radio de arrastre */
  down:false,
  cutting:false, /* true = modo corte (touch largo o botón derecho) */
  x:0,y:0,px:0,py:0
};

let points=[];
let animId=null;
let clothW=0,clothH=0; /* en número de puntos */
let snap=null,snapW=0,snapH=0;
let advancing=false;

/* Punto de tela — arquitectura del original */
class Point{
  constructor(x,y){
    this.x=x;this.y=y;
    this.px=x;this.py=y;
    this.vx=0;this.vy=0;
    this.pinX=null;this.pinY=null;
    this.constraints=[];
  }
  update(dt){
    if(this.pinX!==null&&this.pinY!==null)return;
    /* interacción ratón */
    if(mouse.down){
      const dx=this.x-mouse.x,dy=this.y-mouse.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(mouse.cutting){
        /* modo corte: eliminar constraints que pasen por el cursor */
        if(dist<mouse.cut){
          this.constraints=this.constraints.filter(c=>{
            const od=c.other;
            /* marcar como cortado por usuario */
            c.userCut=true;
            return false;
          });
        }
      } else {
        /* modo arrastre */
        if(dist<mouse.influence){
          const velX=this.x-this.px,velY=this.y-this.py;
          const f=(mouse.influence-dist)/mouse.influence;
          this.px=this.x-(mouse.x-mouse.px)*f*1.8;
          this.py=this.y-(mouse.y-mouse.py)*f*1.8;
        }
      }
    }
    /* Verlet */
    const dt2=dt*dt;
    const nvx=(this.x-this.px)*FRICTION;
    const nvy=(this.y-this.py)*FRICTION;
    this.px=this.x;this.py=this.y;
    this.x+=nvx;this.y+=nvy+GRAVITY*dt2;
    /* bounce contra bordes */
    if(this.x>canvas.width){this.x=canvas.width;this.px=this.x+nvx*BOUNCE;}
    else if(this.x<0){this.x=0;this.px=this.x+nvx*BOUNCE;}
    if(this.y>canvas.height+200){this.y=canvas.height+200;}
  }
  solveConstraints(){
    for(let i=0;i<this.constraints.length;i++){
      this.constraints[i].solve();
    }
    if(this.pinX!==null)this.x=this.pinX;
    if(this.pinY!==null)this.y=this.pinY;
  }
}

class Constraint{
  constructor(p1,p2){
    this.p1=p1;this.p2=p2;
    this.len=SPACING; /* longitud de reposo = spacing */
    this.active=true;
    this.userCut=false;
  }
  solve(){
    if(!this.active)return;
    const dx=this.p1.x-this.p2.x;
    const dy=this.p1.y-this.p2.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    /* romper si supera TEAR_DIST absoluto */
    if(dist>this.len+TEAR_DIST){
      this.active=false;
      return;
    }
    const diff=(this.len-dist)/dist/2;
    const ox=dx*diff,oy=dy*diff;
    if(this.p1.pinX===null)this.p1.x+=ox;
    if(this.p1.pinY===null)this.p1.y+=oy;
    if(this.p2.pinX===null)this.p2.x-=ox;
    if(this.p2.pinY===null)this.p2.y-=oy;
  }
  /* ¿está roto y fue por interacción del usuario? */
  get brokenByUser(){return!this.active&&this.userCut;}
}

function buildCloth(){
  advancing=false;
  points=[];
  const W=canvas.width,H=canvas.height;
  clothW=Math.ceil(W/SPACING)+1;
  clothH=Math.ceil(H/SPACING)+1;

  /* crear puntos */
  for(let r=0;r<clothH;r++){
    for(let c=0;c<clothW;c++){
      const p=new Point(c*SPACING,r*SPACING);
      /* fila superior: anclada */
      if(r===0){p.pinX=c*SPACING;p.pinY=0;}
      points.push(p);
    }
  }
  /* constraints: cada punto conecta con el de arriba y el de la izquierda */
  for(let r=0;r<clothH;r++){
    for(let c=0;c<clothW;c++){
      const idx=r*clothW+c;
      const p=points[idx];
      if(c>0){
        const left=points[idx-1];
        const con=new Constraint(p,left);
        p.constraints.push(con);
      }
      if(r>0){
        const above=points[idx-clothW];
        const con=new Constraint(p,above);
        p.constraints.push(con);
      }
    }
  }
}

/* captura del front como textura */
function captureSnap(){
  return new Promise(res=>{
    const W=canvas.width,H=canvas.height;
    const pf=document.getElementById('pfront');
    const ph=pf.querySelector('.ph');
    const phH=ph?ph.offsetHeight:170;
    const col=MP[cM],gc=GP[cM];
    const off=document.createElement('canvas');
    off.width=W;off.height=H;
    const oc=off.getContext('2d');
    oc.fillStyle=col;oc.fillRect(0,0,W,phH);
    const fs=Math.min(78,W*0.095);
    oc.font=`800 ${fs}px 'Syne',sans-serif`;
    oc.fillStyle='rgba(255,255,255,.93)';oc.fillText(MN[cM],22,phH*.76);
    oc.font=`400 12px 'Syne',sans-serif`;oc.fillStyle='rgba(255,255,255,.5)';oc.fillText(String(cY),24,phH*.76+18);
    oc.fillStyle=gc;oc.fillRect(0,phH,W,H-phH);
    /* días */
    const gt=phH+24,cw=W/7,ch=(H-gt)/7;
    const fd=new Date(cY,cM,1).getDay(),nd=dIn(cY,cM);
    const isn=cY===now.getFullYear()&&cM===now.getMonth();
    oc.textAlign='center';oc.textBaseline='middle';
    for(let d=1;d<=nd;d++){
      const idx=fd+d-1,c2=idx%7,row=Math.floor(idx/7);
      const cx=c2*cw+cw/2,cy=gt+row*ch+ch/2;
      const dow=(fd+d-1)%7,wk=dow===0||dow===6,tod=isn&&d===now.getDate();
      const e=cal[K(cY,cM,d)]||{};
      if(e.color){oc.fillStyle=e.color+'55';oc.fillRect(c2*cw,gt+row*ch,cw,ch);}
      const nfs=Math.min(32,cw*.6);
      oc.font=`700 ${nfs}px 'Syne',sans-serif`;
      if(tod){
        oc.fillStyle=col;oc.beginPath();oc.arc(cx,cy,Math.min(cw,ch)*.35,0,Math.PI*2);oc.fill();
        oc.fillStyle='#fff';
      }else{oc.fillStyle=wk?col:'#1a1612';}
      oc.fillText(String(d),cx,cy);
      if(e.emoji){oc.font=`10px sans-serif`;oc.fillText(e.emoji,cx,cy+ch*.3);}
      if(e.nota){
        oc.fillStyle='#fff';oc.beginPath();oc.arc(cx,cy+ch*.35,3,0,Math.PI*2);oc.fill();
        oc.strokeStyle=col;oc.lineWidth=1.5;oc.beginPath();oc.arc(cx,cy+ch*.35,3,0,Math.PI*2);oc.stroke();
      }
    }
    snapW=W;snapH=H;
    res(off);
  });
}

let lastTime=0;
function frame(ts){
  const dt=Math.min((ts-lastTime)/1000,0.032);
  lastTime=ts;
  /* update */
  for(let i=0;i<points.length;i++)points[i].update(dt);
  /* solve constraints ACCURACY veces */
  for(let iter=0;iter<ACCURACY;iter++)
    for(let i=0;i<points.length;i++)points[i].solveConstraints();
  /* draw */
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(snap){
    const sw=snapW/(clothW-1),sh=snapH/(clothH-1);
    for(let r=0;r<clothH-1;r++){
      for(let c=0;c<clothW-1;c++){
        const i=r*clothW+c;
        const p0=points[i],p1=points[i+1],p2=points[i+clothW],p3=points[i+clothW+1];
        /* saltar quads muy distorsionados */
        const maxD=Math.max(dst2(p0,p1),dst2(p1,p3),dst2(p3,p2),dst2(p2,p0));
        if(maxD>sw*sw*16)continue;
        tri(p0.x,p0.y,p1.x,p1.y,p2.x,p2.y,c*sw,r*sh,(c+1)*sw,r*sh,c*sw,(r+1)*sh);
        tri(p1.x,p1.y,p3.x,p3.y,p2.x,p2.y,(c+1)*sw,r*sh,(c+1)*sw,(r+1)*sh,c*sw,(r+1)*sh);
      }
    }
  }
  /* detectar si tela completamente suelta de anclaje (fila 0 ya no toca) */
  if(!advancing){
    let anchorsLeft=0;
    for(let c=0;c<clothW;c++){
      const p=points[c];
      if(p.pinX!==null)anchorsLeft++;
    }
    /* si no quedan anclajes: toda la tela ha caído */
    if(anchorsLeft===0){
      advancing=true;
      setTimeout(()=>{canvas.style.display='none';advanceMonth();},400);
    }
  }
  animId=requestAnimationFrame(frame);
}

function dst2(a,b){const dx=a.x-b.x,dy=a.y-b.y;return dx*dx+dy*dy;}
function tri(x0,y0,x1,y1,x2,y2,u0,v0,u1,v1,u2,v2){
  const den=u0*(v1-v2)+u1*(v2-v0)+u2*(v0-v1);
  if(Math.abs(den)<.001)return;
  ctx.save();
  ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);ctx.lineTo(x2,y2);ctx.closePath();ctx.clip();
  const a=(x0*(v1-v2)+x1*(v2-v0)+x2*(v0-v1))/den;
  const b=(y0*(v1-v2)+y1*(v2-v0)+y2*(v0-v1))/den;
  const cc=(x0*(u2-u1)+x1*(u0-u2)+x2*(u1-u0))/den;
  const dd=(y0*(u2-u1)+y1*(u0-u2)+y2*(u1-u0))/den;
  const e=x0-a*u0-cc*v0,f=y0-b*u0-dd*v0;
  ctx.transform(a,b,cc,dd,e,f);ctx.drawImage(snap,0,0);ctx.restore();
}

async function startCloth(){
  if(animId)cancelAnimationFrame(animId);
  canvas.style.display='block';
  /* esperar que el DOM esté pintado */
  await new Promise(r=>setTimeout(r,60));
  const st=document.getElementById('stage');
  canvas.width=st.clientWidth;canvas.height=st.clientHeight;
  snap=await captureSnap();
  buildCloth();
  lastTime=performance.now();
  animId=requestAnimationFrame(frame);
}

/* ══ EVENTOS ══ */
function getPos(e){
  const r=canvas.getBoundingClientRect();
  const s=e.touches?e.touches[0]:e;
  return{x:s.clientX-r.left,y:s.clientY-r.top};
}

/* El usuario rasga con click/touch normal — siempre modo corte */
canvas.addEventListener('mousedown',e=>{
  if(advancing||document.querySelector('.panel.open'))return;
  const p=getPos(e);
  mouse.down=true;mouse.cutting=true;
  mouse.x=p.x;mouse.y=p.y;mouse.px=p.x;mouse.py=p.y;
  e.preventDefault();
});
canvas.addEventListener('touchstart',e=>{
  if(advancing||document.querySelector('.panel.open'))return;
  e.preventDefault();
  const p=getPos(e);
  mouse.down=true;mouse.cutting=true;
  mouse.x=p.x;mouse.y=p.y;mouse.px=p.x;mouse.py=p.y;
},{passive:false});
document.addEventListener('mousemove',e=>{
  if(!mouse.down)return;
  const p=getPos(e);mouse.px=mouse.x;mouse.py=mouse.y;mouse.x=p.x;mouse.y=p.y;
});
document.addEventListener('touchmove',e=>{
  if(!mouse.down)return;e.preventDefault();
  const p=getPos(e);mouse.px=mouse.x;mouse.py=mouse.y;mouse.x=p.x;mouse.y=p.y;
},{passive:false});
document.addEventListener('mouseup',()=>{mouse.down=false;mouse.cutting=false;});
document.addEventListener('touchend',()=>{mouse.down=false;mouse.cutting=false;});

/* click en celdas cuando canvas está activo */
canvas.addEventListener('click',e=>{
  if(advancing)return;
  canvas.style.pointerEvents='none';
  const el=document.elementFromPoint(e.clientX,e.clientY);
  canvas.style.pointerEvents='';
  const dc=el&&el.closest&&el.closest('.dc');
  if(dc&&!dc.classList.contains('emp'))tapDay(+dc.dataset.d,+dc.dataset.y,+dc.dataset.m);
});

/* ══ MES ══ */
function advanceMonth(){
  pushAcc(cY,cM);hist.push({y:cY,m:cM});
  cM++;if(cM>11){cM=0;cY++;}
  ['n','c','e'].forEach(t=>{pD[t]=1;pY[t]=cY;pM[t]=cM;});
  build();toast(`${MN[cM]} ${cY}`);
}
function goBack(){
  if(!hist.length){toast('Ya estás en el primer mes');return;}
  popAcc();const p=hist.pop();cY=p.y;cM=p.m;
  ['n','c','e'].forEach(t=>{pD[t]=1;pY[t]=cY;pM[t]=cM;});
  build();toast('↺ '+MN[cM]+' '+cY);
}

/* ══ TAP DÍA ══ */
function tapDay(d,y,m){
  if(document.querySelector('.panel.open'))return;
  ['n','c','e'].forEach(t=>{pD[t]=d;pY[t]=y;pM[t]=m;});
  const si=document.getElementById('si');
  si.textContent=fD(y,m,d);si.classList.add('on');
  setTimeout(()=>si.classList.remove('on'),2400);
}

/* ══ PANELES ══ */
function openP(type){
  closeAll();refreshPD(type);
  document.getElementById('p'+{n:'nota',c:'color',e:'emoji'}[type]).classList.add('open');
  document.getElementById('ov').classList.add('on');
  if(type==='n'){
    const k=K(pY.n,pM.n,pD.n);
    document.getElementById('ntxt').value=(cal[k]&&cal[k].nota)||'';
    setTimeout(()=>document.getElementById('ntxt').focus(),350);
  }
  if(type==='e')document.getElementById('curem').textContent=(cal[K(pY.e,pM.e,pD.e)]||{}).emoji||'';
}
function refreshPD(t){
  const y=pY[t],m=pM[t],d=pD[t],fd=fD(y,m,d);
  const PID={n:'n',c:'c',e:'e'};
  if(t==='n'){document.getElementById('ntit').textContent='Nota · '+MN[m];document.getElementById('nday').textContent=fd;}
  else if(t==='c'){
    document.getElementById('ctit').textContent='Color · '+MN[m];document.getElementById('cday').textContent=fd;
    const cur=(cal[K(y,m,d)]||{}).color||'';
    document.getElementById('cgrid').innerHTML=SW.map(c=>`<div class="sw${cur===c?' sel':''}" style="background:${c}" onclick="saveColor('${c}')"></div>`).join('');
  }else{
    document.getElementById('etit').textContent='Emoji · '+MN[m];document.getElementById('eday').textContent=fd;
    document.getElementById('egrid').innerHTML=EM.map(em=>`<button class="eb" onclick="saveEmoji('${em}')">${em}</button>`).join('');
  }
}
function shiftDay(type,delta){
  const t={nota:'n',color:'c',emoji:'e'}[type];
  let d=pD[t],m=pM[t],y=pY[t];
  d+=delta;
  if(d<1){m--;if(m<0){m=11;y--;}d=dIn(y,m);}
  else if(d>dIn(y,m)){m++;if(m>11){m=0;y++;}d=1;}
  pD[t]=d;pM[t]=m;pY[t]=y;refreshPD(t);
  if(t==='n'){const k=K(y,m,d);document.getElementById('ntxt').value=(cal[k]&&cal[k].nota)||'';}
  if(t==='e')document.getElementById('curem').textContent=(cal[K(y,m,d)]||{}).emoji||'';
}
function closeAll(){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('open'));document.getElementById('ov').classList.remove('on');}

/* ══ ACCIONES ══ */
function refreshCell(y,m,d){
  const c=document.querySelector(`.dc[data-d="${d}"][data-y="${y}"][data-m="${m}"]`);
  if(!c)return;
  const k=K(y,m,d),e=cal[k]||{};
  c.style.background=e.color?e.color+'55':'';
  let mk='';if(e.nota)mk+=`<span class="dot-nota"></span>`;if(e.emoji)mk+=`<span class="em">${e.emoji}</span>`;
  const dm=c.querySelector('.dm');if(dm)dm.innerHTML=mk;
  captureSnap().then(s=>snap=s);
}
function saveNota(){const y=pY.n,m=pM.n,d=pD.n,k=K(y,m,d),v=document.getElementById('ntxt').value.trim();if(!cal[k])cal[k]={};if(v)cal[k].nota=v;else delete cal[k].nota;persist();closeAll();refreshCell(y,m,d);toast('Nota guardada ✓');}
function deleteNota(){const y=pY.n,m=pM.n,d=pD.n,k=K(y,m,d);if(cal[k])delete cal[k].nota;persist();closeAll();refreshCell(y,m,d);toast('Nota borrada');}
function saveColor(col){const y=pY.c,m=pM.c,d=pD.c,k=K(y,m,d);if(!cal[k])cal[k]={};cal[k].color=col;persist();closeAll();refreshCell(y,m,d);toast('Color aplicado ✓');}
function clearColor(){const y=pY.c,m=pM.c,d=pD.c,k=K(y,m,d);if(cal[k])delete cal[k].color;persist();closeAll();refreshCell(y,m,d);toast('Color quitado');}
function saveEmoji(em){const y=pY.e,m=pM.e,d=pD.e,k=K(y,m,d);if(!cal[k])cal[k]={};cal[k].emoji=em;persist();closeAll();refreshCell(y,m,d);toast(em+' añadido ✓');}
function clearEmoji(){const y=pY.e,m=pM.e,d=pD.e,k=K(y,m,d);if(cal[k])delete cal[k].emoji;persist();closeAll();refreshCell(y,m,d);toast('Emoji quitado');}

let tt;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('on'),1900);}

/* Apertura de paneles desde el bar — mapeo de tipo a key */
document.querySelector('[onclick="openP(\'nota\')"]').onclick=()=>openP('n');
document.querySelector('[onclick="openP(\'color\')"]').onclick=()=>openP('c');
document.querySelector('[onclick="openP(\'emoji\')"]').onclick=()=>openP('e');

window.addEventListener('resize',()=>{if(animId)cancelAnimationFrame(animId);startCloth();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeAll();});
setAc(MP[cM]);
build();
</script>
