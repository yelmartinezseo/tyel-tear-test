<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>T-Yel</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#1a1714;font-family:'DM Sans',sans-serif;user-select:none}
#wrap{width:100vw;height:100vh;display:flex;flex-direction:column;position:relative;overflow:hidden}

/* ══ ZONA 1: ANILLAS — altura FIJA, nada la mueve ══ */
#top-zone{
  flex-shrink:0;
  height:56px;        /* altura fija total */
  position:relative;
  z-index:60;
  background:#272320;
  box-shadow:0 3px 14px rgba(0,0,0,.7);
  overflow:visible;   /* para que las strips asomen hacia abajo */
}

/* anillas */
#rings{
  position:absolute;
  top:0;left:0;right:0;bottom:0;
  display:flex;align-items:center;justify-content:space-around;
  padding:0 32px;
  z-index:62;
  pointer-events:none;
}
.ring{
  width:28px;height:28px;border-radius:50%;
  border:4px solid #6a6560;
  background:radial-gradient(circle at 35% 35%,#5a5550,#333028);
  box-shadow:inset 0 2px 5px rgba(0,0,0,.6),0 2px 8px rgba(0,0,0,.5);
  position:relative;flex-shrink:0;
}
.ring::after{
  content:'';position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:10px;height:10px;border-radius:50%;
  background:#4a4844;box-shadow:inset 0 1px 3px rgba(0,0,0,.7);
}

/* cabeceras acumuladas — absolutas dentro de #top-zone, asoman hacia abajo */
#acc-stack{
  position:absolute;
  top:0;left:0;right:0;
  pointer-events:none;
  z-index:58; /* debajo de las anillas */
}
.acc-strip{
  position:absolute;
  left:0;right:0;
  height:56px;
  display:flex;align-items:center;
  padding:0 20px;
  font-family:'Syne',sans-serif;
  font-size:12px;font-weight:700;
  color:rgba(255,255,255,.75);
  top:0; /* todas en top:0, el offset lo da transform */
}

/* ══ ZONA 2: ETAPA DEFORMABLE — ocupa todo el espacio restante entre anillas y bar ══ */
#stage{
  flex:1;
  position:relative;
  overflow:hidden;
  min-height:0;
}

/* páginas DOM — el back se ve limpio */
.page{position:absolute;inset:0;display:flex;flex-direction:column}
#pback{z-index:1}
#pfront{z-index:2}

/* canvas encima del todo */
#tc{
  position:absolute;inset:0;
  z-index:6;
  touch-action:none;
  cursor:grab;
}
#tc.tearing{cursor:crosshair}

/* cabecera del mes */
.ph{padding:20px 24px 30px;flex-shrink:0}
.ph h1{
  font-family:'Syne',sans-serif;
  font-size:clamp(36px,10vw,82px);
  font-weight:800;color:rgba(255,255,255,.94);
  line-height:1;letter-spacing:-2px;
}
.ph .yr{
  font-family:'Syne',sans-serif;
  font-size:12px;color:rgba(255,255,255,.5);margin-top:4px;
}

/* grid */
.pgrid{flex:1;padding:6px 10px 2px;overflow:hidden}
.grid{display:grid;grid-template-columns:repeat(7,1fr)}
.ch{
  text-align:center;
  font-family:'Syne',sans-serif;
  font-size:clamp(11px,2.8vw,20px);
  font-weight:700;color:#7b7470;
  padding:2px 0 6px;
}
.ch.wk{color:var(--accent)}
.dc{
  padding:0;border-radius:8px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:46px;position:relative;gap:2px;
}
.dc.emp{pointer-events:none}
.dn{
  font-family:'Syne',sans-serif;
  font-size:clamp(15px,3.8vw,36px);
  font-weight:700;color:#1a1612;line-height:1;
  display:flex;align-items:center;justify-content:center;
}
.dc.wk .dn{color:var(--accent)}
.dc.tod .dn{
  background:var(--accent);color:#fff;border-radius:50%;
  width:clamp(24px,4.8vw,40px);height:clamp(24px,4.8vw,40px);
  font-size:clamp(11px,2.8vw,24px);
}
.dc.sel{outline:2px solid var(--accent);outline-offset:-1px;border-radius:8px}
.dm{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;min-height:8px}
.dot-nota{width:6px;height:6px;border-radius:50%;background:#fff;border:1.5px solid var(--accent);flex-shrink:0}
.em{font-size:9px;line-height:1}

/* ══ ZONA 3: BAR ══ */
#bar{
  flex-shrink:0;
  background:#f4f0ed;
  display:flex;align-items:center;justify-content:space-around;
  padding:10px 8px 16px;
  border-top:1px solid rgba(0,0,0,.09);
  z-index:10;
}
.bb{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:pointer;padding:4px 10px;border-radius:12px}
.bb:active{background:rgba(0,0,0,.07)}
.bi{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;font-style:normal}
.bl{font-size:11px;font-weight:500;color:#7b7470}

/* OVERLAY + PANELS */
#ov{display:none;position:absolute;inset:0;background:rgba(8,6,4,.56);z-index:20}
#ov.on{display:block}
.panel{
  position:absolute;bottom:-110%;left:0;right:0;
  background:#faf8f6;border-radius:22px 22px 0 0;
  padding:16px 18px 28px;z-index:30;
  transition:bottom .34s cubic-bezier(.22,.8,.22,1);
  max-height:82%;overflow-y:auto;
}
.panel.open{bottom:0}
.phan{width:38px;height:4px;background:rgba(0,0,0,.14);border-radius:2px;margin:0 auto 16px}
.ph-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.ptit{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#999}
.pcl{background:#e8e4e0;border:none;border-radius:50%;width:30px;height:30px;font-size:16px;cursor:pointer;color:#444;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dsr{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:10px 12px;background:#f0ece8;border-radius:12px}
.dsl{font-size:12px;color:#888;font-weight:500;flex-shrink:0}
.dsv{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#1a1612;flex:1}
.dsb{display:flex;gap:6px}
.dsb button{background:#fff;border:1px solid rgba(0,0,0,.12);border-radius:8px;padding:5px 10px;font-size:12px;font-weight:500;cursor:pointer;color:#444}
textarea{width:100%;min-height:90px;border:1.5px solid rgba(0,0,0,.12);border-radius:10px;padding:10px 12px;font-size:14px;color:#1a1612;background:#fff;resize:none;outline:none;font-family:'DM Sans',sans-serif}
textarea:focus{border-color:var(--accent)}
.sbtn{width:100%;margin-top:10px;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer}
.xbtn{width:100%;margin-top:8px;padding:11px;background:rgba(0,0,0,.06);color:var(--accent);border:none;border-radius:10px;font-size:13px;cursor:pointer}
.cgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:12px}
.sw{border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform .12s,border-color .12s;aspect-ratio:1;max-width:46px;width:100%;margin:0 auto;display:block}
.sw:active{transform:scale(1.12)}
.sw.sel{border-color:#1a1612}
.egrid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.eb{background:rgba(0,0,0,.04);border:none;border-radius:10px;padding:9px 4px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.eb:active{background:rgba(0,0,0,.12)}
.cur-em{text-align:center;font-size:28px;margin-bottom:10px;min-height:36px}

#toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(12px);background:#1a1612;color:#fff;padding:8px 18px;border-radius:40px;font-size:12px;font-weight:500;opacity:0;transition:opacity .2s,transform .2s;z-index:200;pointer-events:none;white-space:nowrap}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
#si{position:absolute;top:8px;right:10px;background:rgba(0,0,0,.55);color:#fff;padding:5px 12px;border-radius:30px;font-size:11px;font-weight:700;z-index:7;pointer-events:none;opacity:0;transition:opacity .22s}
#si.on{opacity:1}
</style>
</head>
<body>
<div id="wrap">

  <!-- ZONA 1: ANILLAS — fija, nunca se mueve -->
  <div id="top-zone">
    <div id="acc-stack"></div>
    <div id="rings">
      <div class="ring"></div><div class="ring"></div><div class="ring"></div>
      <div class="ring"></div><div class="ring"></div><div class="ring"></div>
      <div class="ring"></div>
    </div>
  </div>

  <!-- ZONA 2: DEFORMABLE -->
  <div id="stage">
    <div class="page" id="pback"></div>
    <div class="page" id="pfront"></div>
    <canvas id="tc"></canvas>
    <div id="ov" onclick="closeAll()"></div>
    <div id="si"></div>

    <div class="panel" id="pnota">
      <div class="phan"></div>
      <div class="ph-row"><div class="ptit" id="ntit">Nota</div><button class="pcl" onclick="closeAll()">✕</button></div>
      <div class="dsr"><span class="dsl">Día:</span><span class="dsv" id="nday">—</span><div class="dsb"><button onclick="shiftDay('nota',-1)">‹</button><button onclick="shiftDay('nota',1)">›</button></div></div>
      <textarea id="ntxt" placeholder="Escribe tu nota..."></textarea>
      <button class="sbtn" onclick="saveNota()">Guardar nota</button>
      <button class="xbtn" onclick="deleteNota()">Borrar nota de este día</button>
    </div>
    <div class="panel" id="pcolor">
      <div class="phan"></div>
      <div class="ph-row"><div class="ptit" id="ctit">Color</div><button class="pcl" onclick="closeAll()">✕</button></div>
      <div class="dsr"><span class="dsl">Día:</span><span class="dsv" id="cday">—</span><div class="dsb"><button onclick="shiftDay('color',-1)">‹</button><button onclick="shiftDay('color',1)">›</button></div></div>
      <div class="cgrid" id="cgrid"></div>
      <button class="xbtn" onclick="clearColor()">Quitar color de este día</button>
    </div>
    <div class="panel" id="pemoji">
      <div class="phan"></div>
      <div class="ph-row"><div class="ptit" id="etit">Emoji</div><button class="pcl" onclick="closeAll()">✕</button></div>
      <div class="dsr"><span class="dsl">Día:</span><span class="dsv" id="eday">—</span><div class="dsb"><button onclick="shiftDay('emoji',-1)">‹</button><button onclick="shiftDay('emoji',1)">›</button></div></div>
      <div class="cur-em" id="curem"></div>
      <div class="egrid" id="egrid"></div>
      <button class="xbtn" style="margin-top:10px" onclick="clearEmoji()">Quitar emoji de este día</button>
    </div>
    <div id="toast"></div>
  </div>

  <!-- ZONA 3: BAR -->
  <div id="bar">
    <button class="bb" onclick="openP('nota')"><i class="bi" style="background:#c9837a">✎</i><span class="bl">Nota</span></button>
    <button class="bb" onclick="openP('color')"><i class="bi" style="background:#7ab4c9">◈</i><span class="bl">Color</span></button>
    <button class="bb" onclick="openP('emoji')"><i class="bi" style="background:#9b7ac9">☺</i><span class="bl">Emoji</span></button>
    <button class="bb" onclick="goBack()"><i class="bi" style="background:#7ac99b">↺</i><span class="bl">Volver</span></button>
  </div>
</div>

<script>
'use strict';

/* ── PALETA DE MESES ── colores del portfolio de Yel */
const MONTH_PALETTE=[
  '#c9837a', /* Enero   — rosa viejo       */
  '#7a9db5', /* Febrero — azul pizarra     */
  '#8fa07a', /* Marzo   — verde salvia     */
  '#b59a7a', /* Abril   — ocre arena       */
  '#c9837a', /* Mayo    — rosa viejo       */
  '#7ab5a0', /* Junio   — verde agua       */
  '#9b8fb5', /* Julio   — malva            */
  '#b5a07a', /* Agosto  — dorado tostado   */
  '#7a9db5', /* Septiembre — azul pizarra  */
  '#b57a8f', /* Octubre — rosa frambuesa   */
  '#8a9b7a', /* Noviembre — verde musgo    */
  '#7a8fb5', /* Diciembre — azul acero     */
];
/* colores de grid asociados al mes */
const GRID_PALETTE=[
  '#d4c8c4','#c4cdd4','#c8d0c4','#d4ccc4',
  '#d4c8c4','#c4d0cc','#ccc8d4','#d4ccc4',
  '#c4cdd4','#d4c4cc','#cacdd4','#c4cad4', // ← corregido: mismo largo
];

const MN=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DN=['D','L','M','X','J','V','S'];
const DNS=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
const SWATCHES=['#FFD93D','#FF9A3C','#FF7878','#FF4C6A','#C47ED6','#7A6FD8','#5B9BF0','#3AC569','#2BD4C4','#888888'];
const EMJS=['⭐','❤️','🎯','✅','⚠️','💡','🎉','📅','🔔','🎂','💬','✏️','🏃','💪','🍎','☕','🌙','✨','🌱','📌','🔥','🎵','📝','🏆'];

const now=new Date();
let cY=now.getFullYear(), cM=now.getMonth();
let accent=MONTH_PALETTE[cM];

/* CSS var accent global */
function setAccent(col){
  accent=col;
  document.documentElement.style.setProperty('--accent',col);
  // ajustar color grid del back (mes anterior)
}

let pDay={nota:now.getDate(),color:now.getDate(),emoji:now.getDate()};
let pYear={nota:cY,color:cY,emoji:cY};
let pMonth={nota:cM,color:cM,emoji:cM};
let hist=[];
let accMeses=[]; /* {y,m,col} */
let cal={};
try{cal=JSON.parse(localStorage.getItem('tyc7')||'{}')}catch(e){}
const persist=()=>{try{localStorage.setItem('tyc7',JSON.stringify(cal))}catch(e){}};
const key=(y,m,d)=>`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const daysIn=(y,m)=>new Date(y,m+1,0).getDate();
const fullDate=(y,m,d)=>`${DNS[new Date(y,m,d).getDay()]} ${d} de ${MN[m]} ${y}`;

/* ── BUILD DOM ── */
function buildCal(y,m,el,isFront){
  const fd=new Date(y,m,1).getDay(), nd=daysIn(y,m);
  const isnow=(y===now.getFullYear()&&m===now.getMonth());
  const col=MONTH_PALETTE[m];
  const gcol=GRID_PALETTE[m];
  let h=`<div class="ph" style="background:${col}"><h1>${MN[m]}</h1><div class="yr">${y}</div></div>`;
  h+=`<div class="pgrid" style="background:${gcol}"><div class="grid">`;
  DN.forEach((d,i)=>h+=`<div class="ch${(i===0||i===6)?' wk':''}">${d}</div>`);
  for(let i=0;i<fd;i++) h+=`<div class="dc emp"></div>`;
  for(let d=1;d<=nd;d++){
    const dow=(fd+d-1)%7, wk=dow===0||dow===6;
    const tod=isnow&&d===now.getDate();
    const k=key(y,m,d), e=cal[k]||{};
    const bg=e.color?` style="background:${e.color}55"`:'';
    let mk='';
    if(e.nota) mk+=`<span class="dot-nota"></span>`;
    if(e.emoji) mk+=`<span class="em">${e.emoji}</span>`;
    const cls=['dc',wk&&'wk',tod&&'tod'].filter(Boolean).join(' ');
    h+=`<div class="${cls}"${bg} data-d="${d}" data-y="${y}" data-m="${m}"><div class="dn">${d}</div><div class="dm">${mk}</div></div>`;
  }
  h+=`</div></div>`;
  el.innerHTML=h;
  if(isFront) setAccent(col);
}

function build(){
  const pm=cM===0?11:cM-1, py=cM===0?cY-1:cY;
  buildCal(py,pm,document.getElementById('pback'),false);
  buildCal(cY,cM,document.getElementById('pfront'),true);
  initTear();
}

/* ── CABECERAS ACUMULADAS ── viven dentro de #top-zone, sobresalen hacia abajo */
function pushAccHeader(y,m){
  accMeses.push({y,m,col:MONTH_PALETTE[m]});
  renderAcc();
}
function popAccHeader(){
  if(accMeses.length) accMeses.pop();
  renderAcc();
}
function renderAcc(){
  const stack=document.getElementById('acc-stack');
  stack.innerHTML='';
  /* Mostrar máx 5; las antiguas más atrás (más abajo y más oscuras) */
  const show=accMeses.slice(-5);
  show.forEach((item,i)=>{
    const el=document.createElement('div');
    el.className='acc-strip';
    /* offset hacia abajo desde top-zone: i=0 más atrás, last más visible */
    const offset=4+(show.length-1-i)*5; /* últimas más abajo */
    el.style.cssText=`
      background:${item.col};
      transform:translateY(${offset}px);
      opacity:${0.35+i*0.13};
      font-size:${10+i}px;
      z-index:${55+i};
    `;
    el.textContent=`${MN[item.m]} ${item.y}`;
    stack.appendChild(el);
  });
}

/* ══════════════════════════════
   FÍSICA CANVAS — paper tear
══════════════════════════════ */
const canvas=document.getElementById('tc');
const ctx=canvas.getContext('2d');

const CM=26, RM=16; /* cols/rows malla */
const STIFF=0.82, GRAV=0.48, DAMP=0.986;
let TDIST=50, MR=80; /* calculados dinámicamente */
let pts=[], lks=[];
let mDown=false, mx=0,my=0,pmx=0,pmy=0;
let torn=false, busy=false, touched=false;
let snap=null, sW=0,sH=0;
let animId=null;

function resizeCanvas(){
  const st=document.getElementById('stage');
  canvas.width=st.clientWidth;
  canvas.height=st.clientHeight;
}

/* captura el front como imagen para usarla como textura */
function captureFront(){
  return new Promise(res=>{
    const W=canvas.width, H=canvas.height;
    const pf=document.getElementById('pfront');
    const ph=pf.querySelector('.ph');
    const phH=ph?ph.offsetHeight:170;
    const col=MONTH_PALETTE[cM];
    const gcol=GRID_PALETTE[cM];

    const off=document.createElement('canvas');
    off.width=W; off.height=H;
    const oc=off.getContext('2d');

    /* cabecera */
    oc.fillStyle=col;
    oc.fillRect(0,0,W,phH);
    const fs=Math.min(80,W*0.1);
    oc.font=`800 ${fs}px 'Syne',sans-serif`;
    oc.fillStyle='rgba(255,255,255,.93)';
    oc.fillText(MN[cM],24,phH*0.76);
    oc.font=`400 12px 'Syne',sans-serif`;
    oc.fillStyle='rgba(255,255,255,.5)';
    oc.fillText(String(cY),26,phH*0.76+19);

    /* grid */
    oc.fillStyle=gcol;
    oc.fillRect(0,phH,W,H-phH);

    /* días */
    const gTop=phH+26;
    const cw=W/7, ch=(H-gTop)/7;
    const fd=new Date(cY,cM,1).getDay();
    const nd=daysIn(cY,cM);
    const isnow=(cY===now.getFullYear()&&cM===now.getMonth());
    oc.textAlign='center'; oc.textBaseline='middle';
    const numFs=Math.min(34,cw*0.62);

    for(let d=1;d<=nd;d++){
      const idx=fd+d-1;
      const c2=idx%7, r=Math.floor(idx/7);
      const cx=c2*cw+cw/2, cy=gTop+r*ch+ch/2;
      const dow=(fd+d-1)%7, wk=dow===0||dow===6;
      const tod=isnow&&d===now.getDate();
      const e=cal[key(cY,cM,d)]||{};

      if(e.color){
        oc.fillStyle=e.color+'55';
        oc.fillRect(c2*cw,gTop+r*ch,cw,ch);
      }
      oc.font=`700 ${numFs}px 'Syne',sans-serif`;
      if(tod){
        oc.fillStyle=col;
        oc.beginPath();oc.arc(cx,cy,Math.min(cw,ch)*0.36,0,Math.PI*2);oc.fill();
        oc.fillStyle='#fff';
      } else {
        oc.fillStyle=wk?col:'#1a1612';
      }
      oc.fillText(String(d),cx,cy);

      /* emoji */
      if(e.emoji){
        oc.font=`11px sans-serif`;
        oc.fillText(e.emoji,cx,cy+ch*0.32);
      }
      /* dot nota — blanco con borde */
      if(e.nota){
        oc.fillStyle='#fff';
        oc.beginPath();oc.arc(cx,cy+ch*0.36,3.5,0,Math.PI*2);oc.fill();
        oc.strokeStyle=col;oc.lineWidth=1.5;
        oc.beginPath();oc.arc(cx,cy+ch*0.36,3.5,0,Math.PI*2);oc.stroke();
      }
    }
    res(off);
  });
}

function buildMesh(){
  const W=canvas.width, H=canvas.height;
  const dx=W/(CM-1), dy=H/(RM-1);
  /* TDIST: necesita ser mayor que la distancia de reposo (diagonal de celda) */
  const cellDiag=Math.sqrt(dx*dx+dy*dy);
  TDIST=cellDiag*2.6;  /* papel se rompe al doble de tensión */
  MR=cellDiag*3.2;

  pts=[]; lks=[];
  for(let r=0;r<RM;r++){
    for(let c=0;c<CM;c++){
      pts.push({x:c*dx,y:r*dy,px:c*dx,py:r*dy,pinned:r===0});
    }
  }
  /* links horizontales */
  for(let r=0;r<RM;r++)
    for(let c=0;c<CM-1;c++)
      lks.push({a:r*CM+c,b:r*CM+c+1,len:dx,torn:false});
  /* links verticales */
  for(let r=0;r<RM-1;r++)
    for(let c=0;c<CM;c++)
      lks.push({a:r*CM+c,b:(r+1)*CM+c,len:dy,torn:false});
}

async function initTear(){
  resizeCanvas();
  snap=await captureFront();
  sW=canvas.width; sH=canvas.height;
  torn=false; busy=false; touched=false;
  buildMesh();
  if(animId) cancelAnimationFrame(animId);
  loop();
}

function d2(a,b){const dx=a.x-b.x,dy=a.y-b.y;return dx*dx+dy*dy;}

function update(){
  if(torn) return;
  const H=canvas.height;

  /* Verlet */
  for(let i=0;i<pts.length;i++){
    const p=pts[i];
    if(p.pinned) continue;
    const vx=(p.x-p.px)*DAMP, vy=(p.y-p.py)*DAMP;
    p.px=p.x; p.py=p.y;
    p.x+=vx; p.y+=vy+GRAV;
    if(p.y>H+400) p.y=H+400;
  }

  /* interacción cursor — CORTE */
  if(mDown && touched){
    const vx=mx-pmx, vy=my-pmy;
    for(let i=0;i<lks.length;i++){
      const lk=lks[i];
      if(lk.torn) continue;
      const pa=pts[lk.a], pb=pts[lk.b];
      if(pa.pinned&&pb.pinned) continue;
      const cx=(pa.x+pb.x)*.5, cy=(pa.y+pb.y)*.5;
      const dx=cx-mx, dy=cy-my;
      if(Math.sqrt(dx*dx+dy*dy)<MR*.55){
        lk.torn=true;
        if(!pa.pinned){pa.px=pa.x-vx*.08;pa.py=pa.y-vy*.08;}
        if(!pb.pinned){pb.px=pb.x-vx*.08;pb.py=pb.y-vy*.08;}
      }
    }
    /* arrastrar puntos cercanos */
    for(let i=0;i<pts.length;i++){
      const p=pts[i];
      if(p.pinned) continue;
      const dx=p.x-mx, dy=p.y-my;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<MR*.38){
        const f=(MR*.38-dist)/(MR*.38);
        p.x+=vx*f*.65; p.y+=vy*f*.65;
      }
    }
  }
  pmx=mx; pmy=my;

  /* constraints */
  for(let it=0;it<3;it++){
    for(let i=0;i<lks.length;i++){
      const lk=lks[i];
      if(lk.torn) continue;
      const pa=pts[lk.a], pb=pts[lk.b];
      const dx=pb.x-pa.x, dy=pb.y-pa.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(!dist) continue;
      if(dist>TDIST){lk.torn=true;continue;}
      const diff=(dist-lk.len)/dist*STIFF*.5;
      const ox=dx*diff, oy=dy*diff;
      if(!pa.pinned){pa.x+=ox;pa.y+=oy;}
      if(!pb.pinned){pb.x-=ox;pb.y-=oy;}
    }
  }

  /* detección de arrancado — SOLO tras interacción real */
  if(touched && !torn && !busy){
    let perfLinks=0, tornPerf=0;
    for(let i=0;i<lks.length;i++){
      const lk=lks[i];
      const pa=pts[lk.a], pb=pts[lk.b];
      /* links que cruzan entre pinned y no-pinned = fila de perforación */
      if(pa.pinned!==pb.pinned){
        perfLinks++;
        if(lk.torn) tornPerf++;
      }
    }
    if(perfLinks>0 && tornPerf/perfLinks>=0.88){
      busy=true; torn=true;
      /* impulso de caída */
      for(let i=CM;i<pts.length;i++) pts[i].py=pts[i].y-2;
      setTimeout(advanceMonth,520);
    }
  }
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(torn||!snap) return;
  const sw=sW/(CM-1), sh=sH/(RM-1);
  for(let r=0;r<RM-1;r++){
    for(let c=0;c<CM-1;c++){
      const i=r*CM+c;
      const p0=pts[i],p1=pts[i+1],p2=pts[i+CM],p3=pts[i+CM+1];
      /* saltar quads muy distorsionados — evita artefactos visuales */
      if(Math.max(d2(p0,p1),d2(p1,p3),d2(p3,p2),d2(p2,p0))>sw*sw*7) continue;
      tri(p0.x,p0.y,p1.x,p1.y,p2.x,p2.y,c*sw,r*sh,(c+1)*sw,r*sh,c*sw,(r+1)*sh);
      tri(p1.x,p1.y,p3.x,p3.y,p2.x,p2.y,(c+1)*sw,r*sh,(c+1)*sw,(r+1)*sh,c*sw,(r+1)*sh);
    }
  }
}

function tri(x0,y0,x1,y1,x2,y2,u0,v0,u1,v1,u2,v2){
  const den=u0*(v1-v2)+u1*(v2-v0)+u2*(v0-v1);
  if(Math.abs(den)<.001) return;
  ctx.save();
  ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);ctx.lineTo(x2,y2);ctx.closePath();ctx.clip();
  const a=(x0*(v1-v2)+x1*(v2-v0)+x2*(v0-v1))/den;
  const b=(y0*(v1-v2)+y1*(v2-v0)+y2*(v0-v1))/den;
  const cc=(x0*(u2-u1)+x1*(u0-u2)+x2*(u1-u0))/den;
  const dd=(y0*(u2-u1)+y1*(u0-u2)+y2*(u1-u0))/den;
  const e=x0-a*u0-cc*v0, f=y0-b*u0-dd*v0;
  ctx.transform(a,b,cc,dd,e,f);
  ctx.drawImage(snap,0,0);
  ctx.restore();
}

function loop(){update();draw();animId=requestAnimationFrame(loop);}

/* ── EVENTOS ── */
function gp(e){const r=canvas.getBoundingClientRect(),s=e.touches?e.touches[0]:e;return{x:s.clientX-r.left,y:s.clientY-r.top};}
canvas.addEventListener('mousedown',e=>{
  if(torn||document.querySelector('.panel.open')) return;
  const p=gp(e);mx=p.x;my=p.y;pmx=p.x;pmy=p.y;
  mDown=true;touched=true;canvas.classList.add('tearing');
});
canvas.addEventListener('touchstart',e=>{
  if(torn||document.querySelector('.panel.open')) return;
  e.preventDefault();
  const p=gp(e);mx=p.x;my=p.y;pmx=p.x;pmy=p.y;
  mDown=true;touched=true;canvas.classList.add('tearing');
},{passive:false});
document.addEventListener('mousemove',e=>{if(!mDown)return;const p=gp(e);mx=p.x;my=p.y;});
document.addEventListener('touchmove',e=>{if(!mDown)return;e.preventDefault();const p=gp(e);mx=p.x;my=p.y;},{passive:false});
document.addEventListener('mouseup',()=>{mDown=false;canvas.classList.remove('tearing');});
document.addEventListener('touchend',()=>{mDown=false;canvas.classList.remove('tearing');});

/* click en celdas pasando a través del canvas */
canvas.addEventListener('click',e=>{
  if(torn) return;
  canvas.style.pointerEvents='none';
  const el=document.elementFromPoint(e.clientX,e.clientY);
  canvas.style.pointerEvents='';
  const dc=el&&el.closest&&el.closest('.dc');
  if(dc&&!dc.classList.contains('emp')){
    tapDay(+dc.dataset.d,+dc.dataset.y,+dc.dataset.m);
  }
});

/* ── AVANZAR / VOLVER MES ── */
function advanceMonth(){
  pushAccHeader(cY,cM);
  hist.push({y:cY,m:cM});
  cM++;if(cM>11){cM=0;cY++;}
  ['nota','color','emoji'].forEach(t=>{pDay[t]=1;pYear[t]=cY;pMonth[t]=cM;});
  build();
  toast(`${MN[cM]} ${cY}`);
}
function goBack(){
  if(!hist.length){toast('Ya estás en el primer mes');return;}
  popAccHeader();
  const p=hist.pop();cY=p.y;cM=p.m;
  ['nota','color','emoji'].forEach(t=>{pDay[t]=1;pYear[t]=cY;pMonth[t]=cM;});
  build();toast('↺ '+MN[cM]+' '+cY);
}

/* ── TAP DÍA ── */
function tapDay(d,y,m){
  if(document.querySelector('.panel.open')) return;
  ['nota','color','emoji'].forEach(t=>{pDay[t]=d;pYear[t]=y;pMonth[t]=m;});
  const si=document.getElementById('si');
  si.textContent=fullDate(y,m,d);si.classList.add('on');
  setTimeout(()=>si.classList.remove('on'),2400);
}

/* ── PANELES ── */
function openP(type){
  closeAll();refreshPDay(type);
  document.getElementById('p'+type).classList.add('open');
  document.getElementById('ov').classList.add('on');
  if(type==='nota'){
    const k=key(pYear.nota,pMonth.nota,pDay.nota);
    document.getElementById('ntxt').value=(cal[k]&&cal[k].nota)||'';
    setTimeout(()=>document.getElementById('ntxt').focus(),350);
  }
  if(type==='emoji') document.getElementById('curem').textContent=(cal[key(pYear.emoji,pMonth.emoji,pDay.emoji)]||{}).emoji||'';
}
function refreshPDay(type){
  const y=pYear[type],m=pMonth[type],d=pDay[type],fd=fullDate(y,m,d);
  if(type==='nota'){document.getElementById('ntit').textContent='Nota · '+MN[m];document.getElementById('nday').textContent=fd;}
  else if(type==='color'){
    document.getElementById('ctit').textContent='Color · '+MN[m];
    document.getElementById('cday').textContent=fd;
    const cur=(cal[key(y,m,d)]||{}).color||'';
    document.getElementById('cgrid').innerHTML=SWATCHES.map(c=>`<div class="sw${cur===c?' sel':''}" style="background:${c}" onclick="saveColor('${c}')"></div>`).join('');
  } else if(type==='emoji'){
    document.getElementById('etit').textContent='Emoji · '+MN[m];
    document.getElementById('eday').textContent=fd;
    document.getElementById('egrid').innerHTML=EMJS.map(em=>`<button class="eb" onclick="saveEmoji('${em}')">${em}</button>`).join('');
  }
}
function shiftDay(type,delta){
  let d=pDay[type],m=pMonth[type],y=pYear[type];
  d+=delta;
  if(d<1){m--;if(m<0){m=11;y--;}d=daysIn(y,m);}
  else if(d>daysIn(y,m)){m++;if(m>11){m=0;y++;}d=1;}
  pDay[type]=d;pMonth[type]=m;pYear[type]=y;refreshPDay(type);
  if(type==='nota'){const k=key(y,m,d);document.getElementById('ntxt').value=(cal[k]&&cal[k].nota)||'';}
  if(type==='emoji'){document.getElementById('curem').textContent=(cal[key(y,m,d)]||{}).emoji||'';}
}
function closeAll(){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('open'));document.getElementById('ov').classList.remove('on');}

/* ── ACCIONES ── */
function refreshCell(y,m,d){
  const c=document.querySelector(`.dc[data-d="${d}"][data-y="${y}"][data-m="${m}"]`);
  if(!c) return;
  const k=key(y,m,d),e=cal[k]||{};
  c.style.background=e.color?e.color+'55':'';
  let mk='';
  if(e.nota) mk+=`<span class="dot-nota"></span>`;
  if(e.emoji) mk+=`<span class="em">${e.emoji}</span>`;
  const dm=c.querySelector('.dm');if(dm) dm.innerHTML=mk;
  captureFront().then(s=>snap=s);
}
function saveNota(){const y=pYear.nota,m=pMonth.nota,d=pDay.nota,k=key(y,m,d),v=document.getElementById('ntxt').value.trim();if(!cal[k])cal[k]={};if(v)cal[k].nota=v;else delete cal[k].nota;persist();closeAll();refreshCell(y,m,d);toast('Nota guardada ✓');}
function deleteNota(){const y=pYear.nota,m=pMonth.nota,d=pDay.nota,k=key(y,m,d);if(cal[k])delete cal[k].nota;persist();closeAll();refreshCell(y,m,d);toast('Nota borrada');}
function saveColor(col){const y=pYear.color,m=pMonth.color,d=pDay.color,k=key(y,m,d);if(!cal[k])cal[k]={};cal[k].color=col;persist();closeAll();refreshCell(y,m,d);toast('Color aplicado ✓');}
function clearColor(){const y=pYear.color,m=pMonth.color,d=pDay.color,k=key(y,m,d);if(cal[k])delete cal[k].color;persist();closeAll();refreshCell(y,m,d);toast('Color quitado');}
function saveEmoji(em){const y=pYear.emoji,m=pMonth.emoji,d=pDay.emoji,k=key(y,m,d);if(!cal[k])cal[k]={};cal[k].emoji=em;persist();closeAll();refreshCell(y,m,d);toast(em+' añadido ✓');}
function clearEmoji(){const y=pYear.emoji,m=pMonth.emoji,d=pDay.emoji,k=key(y,m,d);if(cal[k])delete cal[k].emoji;persist();closeAll();refreshCell(y,m,d);toast('Emoji quitado');}

let tt;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('on'),1900);}

window.addEventListener('resize',()=>{resizeCanvas();captureFront().then(s=>snap=s);});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeAll();});

setAccent(MONTH_PALETTE[cM]);
build();
</script>
