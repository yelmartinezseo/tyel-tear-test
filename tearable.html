<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T-Yel Calendario</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#c8c4c0;font-family:'DM Sans',sans-serif}
#app{width:100vw;height:100vh;display:flex;flex-direction:column;position:relative;overflow:hidden}
.pw{flex:1;position:relative;overflow:hidden}
.page{position:absolute;inset:0;display:flex;flex-direction:column;transform-origin:top center}
.pback{z-index:1}
.pfront{z-index:2}
.ph{background:#c9837a;padding:24px 28px 44px;flex-shrink:0}
.ph h1{font-family:'Syne',sans-serif;font-size:clamp(40px,9vw,80px);font-weight:800;color:rgba(255,255,255,.93);line-height:1;letter-spacing:-1.5px}
.ph .yr{font-family:'Syne',sans-serif;font-size:14px;color:rgba(255,255,255,.6);margin-top:3px}
.pb{flex:1;background:#c8c4c0;padding:10px 14px 0}
.grid{display:grid;grid-template-columns:repeat(7,1fr)}
.ch{text-align:center;font-family:'Syne',sans-serif;font-size:clamp(14px,3vw,26px);font-weight:700;color:#6b6460;padding:5px 0 10px}
.ch.wk{color:#c9837a}
.dc{text-align:center;padding:3px 1px 6px;border-radius:8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;min-height:56px;transition:background .12s;position:relative}
.dc:active{background:rgba(255,255,255,.3)}
.dc.emp{pointer-events:none}
.dn{font-family:'Syne',sans-serif;font-size:clamp(18px,4vw,40px);font-weight:700;color:#1a1612;line-height:1.1}
.dc.wk .dn{color:#c9837a}
.dc.tod .dn{background:#c9837a;color:#fff;border-radius:50%;width:clamp(30px,5.5vw,46px);height:clamp(30px,5.5vw,46px);display:flex;align-items:center;justify-content:center;font-size:clamp(14px,3vw,28px)}
.dc.sel{background:rgba(255,255,255,.38)!important;outline:2.5px solid rgba(201,131,122,.75)}
.dm{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;min-height:10px;margin-top:1px}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.em{font-size:10px;line-height:1}
/* BAR */
.bar{background:#f9f5f2;display:flex;align-items:center;justify-content:space-around;padding:6px 10px 14px;border-top:1px solid rgba(0,0,0,.07);flex-shrink:0;position:relative;z-index:10}
.bb{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:pointer;padding:4px 12px;border-radius:12px}
.bi{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff}
.bl{font-size:11px;font-weight:500;color:#6b6460}
/* OVERLAY */
.ov{display:none;position:absolute;inset:0;background:rgba(10,8,6,.52);z-index:20;backdrop-filter:blur(2px)}
.ov.on{display:block}
/* PANELS */
.panel{position:absolute;bottom:-110%;left:0;right:0;background:#faf8f6;border-radius:20px 20px 0 0;padding:20px 18px 30px;z-index:30;transition:bottom .33s cubic-bezier(.25,.8,.25,1);max-height:78%;overflow-y:auto}
.panel.open{bottom:0}
.phan{width:38px;height:4px;background:rgba(0,0,0,.15);border-radius:2px;margin:0 auto 14px}
.pt{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#888;margin-bottom:14px}
.pcl{position:absolute;top:14px;right:14px;background:rgba(0,0,0,.08);border:none;border-radius:50%;width:28px;height:28px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#1a1612}
/* NOTA */
textarea{width:100%;min-height:90px;border:1.5px solid rgba(0,0,0,.12);border-radius:10px;padding:10px 12px;font-size:14px;color:#1a1612;background:#fff;resize:none;outline:none;font-family:'DM Sans',sans-serif}
textarea:focus{border-color:#c9837a}
.sbtn{width:100%;margin-top:10px;padding:13px;background:#c9837a;color:#fff;border:none;border-radius:10px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer}
/* COLOR */
.cgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.sw{border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform .12s,border-color .12s;aspect-ratio:1;max-width:48px;width:100%;margin:0 auto;display:block}
.sw:hover,.sw:active{transform:scale(1.1)}
.sw.sel{border-color:#1a1612}
.xbtn{width:100%;margin-top:12px;padding:10px;background:rgba(0,0,0,.06);color:#1a1612;border:none;border-radius:8px;font-size:13px;cursor:pointer}
/* EMOJI */
.egrid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.eb{background:rgba(0,0,0,.04);border:none;border-radius:10px;padding:10px 4px;font-size:20px;cursor:pointer;transition:background .12s,transform .12s;display:flex;align-items:center;justify-content:center}
.eb:active{background:rgba(0,0,0,.12);transform:scale(1.1)}
/* TOAST */
#toast{position:absolute;bottom:75px;left:50%;transform:translateX(-50%) translateY(14px);background:#1a1612;color:#fff;padding:8px 18px;border-radius:40px;font-size:12px;font-weight:500;opacity:0;transition:opacity .22s,transform .22s;z-index:50;pointer-events:none;white-space:nowrap}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
/* SELINFO */
#si{position:absolute;top:10px;right:10px;background:rgba(201,131,122,.9);color:#fff;padding:5px 12px;border-radius:30px;font-size:11px;font-weight:600;z-index:15;pointer-events:none;opacity:0;transition:opacity .25s}
#si.on{opacity:1}
/* HINT */
#hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(201,131,122,.85);color:#fff;padding:8px 18px;border-radius:30px;font-size:12px;font-weight:700;pointer-events:none;opacity:0;transition:opacity .3s;z-index:12;white-space:nowrap}
#hint.on{opacity:1}
</style>
</head>
<body>
<div id="app">
  <div class="pw" id="pw">
    <div class="page pback" id="pb"></div>
    <div class="page pfront" id="pf"></div>
    <div class="ov" id="ov" onclick="closeAll()"></div>
    <div id="si"></div>
    <div id="hint">Arrastra desde la cabecera ↑</div>

    <div class="panel" id="pnota">
      <div class="phan"></div>
      <button class="pcl" onclick="closeAll()">✕</button>
      <div class="pt" id="ntit">Nota</div>
      <textarea id="ntxt" placeholder="Escribe tu nota..."></textarea>
      <button class="sbtn" onclick="saveNota()">Guardar</button>
    </div>

    <div class="panel" id="pcolor">
      <div class="phan"></div>
      <button class="pcl" onclick="closeAll()">✕</button>
      <div class="pt" id="ctit">Color</div>
      <div class="cgrid" id="cgrid"></div>
      <button class="xbtn" onclick="clearColor()">Quitar color</button>
    </div>

    <div class="panel" id="pemoji">
      <div class="phan"></div>
      <button class="pcl" onclick="closeAll()">✕</button>
      <div class="pt" id="etit">Emoji</div>
      <div class="egrid" id="egrid"></div>
      <button class="xbtn" style="margin-top:10px" onclick="clearEmoji()">Quitar emoji</button>
    </div>
  </div>

  <div class="bar">
    <button class="bb" onclick="openP('nota')">
      <span class="bi" style="background:#c9837a">✎</span><span class="bl">Nota</span>
    </button>
    <button class="bb" onclick="openP('color')">
      <span class="bi" style="background:#7ab4c9">◈</span><span class="bl">Color</span>
    </button>
    <button class="bb" onclick="openP('emoji')">
      <span class="bi" style="background:#9b7ac9">☺</span><span class="bl">Emoji</span>
    </button>
    <button class="bb" onclick="goBack()">
      <span class="bi" style="background:#7ac99b">↺</span><span class="bl">Volver</span>
    </button>
  </div>

  <div id="toast"></div>
</div>

<script>
const MN=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DN=['D','L','M','X','J','V','S'];
const COLS=['#FFD93D','#FF9A3C','#FF7878','#FF4C6A','#C47ED6','#7A6FD8','#5B9BF0','#3AC569','#2BD4C4','#888888'];
const EMJS=['⭐','❤️','🎯','✅','⚠️','💡','🎉','📅','🔔','🎂','💬','✏️','🏃','💪','🍎','☕','🌙','✨','🌱','📌','🔥','🎵','📝','🏆'];

const now=new Date();
let cY=now.getFullYear(),cM=now.getMonth();
let sD=now.getDate(),sY=cY,sM=cM;
let hist=[];
let cal={};
try{cal=JSON.parse(localStorage.getItem('tyc')||'{}')}catch(e){}
const save=()=>{try{localStorage.setItem('tyc',JSON.stringify(cal))}catch(e){}};
const key=(y,m,d)=>y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');

function buildCal(y,m,el){
  const fd=new Date(y,m,1).getDay();
  const nd=new Date(y,m+1,0).getDate();
  const isnow=(y===now.getFullYear()&&m===now.getMonth());
  let h=`<div class="ph"><h1>${MN[m]}</h1><div class="yr">${y}</div></div><div class="pb"><div class="grid">`;
  DN.forEach((d,i)=>h+=`<div class="ch${i===0||i===6?' wk':''}">${d}</div>`);
  for(let i=0;i<fd;i++) h+=`<div class="dc emp"></div>`;
  for(let d=1;d<=nd;d++){
    const dow=(fd+d-1)%7,wk=dow===0||dow===6;
    const tod=isnow&&d===now.getDate();
    const sel=(y===sY&&m===sM&&d===sD);
    const k=key(y,m,d),e=cal[k]||{};
    const bg=e.color?`style="background:${e.color}22"`:'';
    let mk='';
    if(e.nota) mk+=`<span class="dot" style="background:#c9837a"></span>`;
    if(e.color) mk+=`<span class="dot" style="background:${e.color}"></span>`;
    if(e.emoji) mk+=`<span class="em">${e.emoji}</span>`;
    h+=`<div class="dc${wk?' wk':''}${tod?' tod':''}${sel?' sel':''}" ${bg} data-d="${d}" data-y="${y}" data-m="${m}" onclick="selDay(${d},${y},${m})"><div class="dn">${d}</div><div class="dm">${mk}</div></div>`;
  }
  h+=`</div></div>`;
  el.innerHTML=h;
}

let dragging=false,startY=0,torn=false,busy=false;
const pf=document.getElementById('pf');
const pb=document.getElementById('pb');

function build(){
  torn=false;busy=false;
  const pm=cM===0?11:cM-1,py=cM===0?cY-1:cY;
  buildCal(py,pm,pb);
  buildCal(cY,cM,pf);
  pf.style.cssText='transform:none;transition:none;z-index:2';
  const h=document.getElementById('hint');
  h.classList.add('on');
  setTimeout(()=>h.classList.remove('on'),2000);
}

function gy(e){return e.touches?e.touches[0].clientY:e.clientY}

function startDrag(e){
  if(torn||busy) return;
  const rect=pf.getBoundingClientRect();
  if(gy(e)-rect.top>190) return;
  dragging=true; startY=gy(e);
  pf.style.transition='none';
  if(e.cancelable) e.preventDefault();
}
function moveDrag(e){
  if(!dragging||torn||busy) return;
  const delta=Math.max(0,startY-gy(e));
  const ang=Math.min(delta/(window.innerHeight*.58),1)*170;
  pf.style.transform=`perspective(800px) rotateX(${ang}deg)`;
  if(e.cancelable) e.preventDefault();
}
function endDrag(){
  if(!dragging||torn||busy) return;
  dragging=false;
  const m=pf.style.transform.match(/rotateX\(([0-9.]+)deg\)/);
  const ang=m?parseFloat(m[1]):0;
  if(ang>65){
    busy=true; torn=true;
    pf.style.transition='transform .43s cubic-bezier(.4,0,.6,1)';
    pf.style.transform='perspective(800px) rotateX(180deg) translateY(-100%)';
    setTimeout(()=>{
      hist.push({y:cY,m:cM});
      cM++;if(cM>11){cM=0;cY++;}
      sY=cY;sM=cM;sD=1;
      build();toast(`${MN[cM]} ${cY}`);
    },460);
  } else {
    pf.style.transition='transform .28s ease-out';
    pf.style.transform='none';
  }
}

pf.addEventListener('mousedown',startDrag);
pf.addEventListener('touchstart',startDrag,{passive:false});
document.addEventListener('mousemove',moveDrag);
document.addEventListener('touchmove',moveDrag,{passive:false});
document.addEventListener('mouseup',endDrag);
document.addEventListener('touchend',endDrag);

function selDay(d,y,m){
  if(document.querySelector('.panel.open')) return;
  sD=d;sY=y;sM=m;
  document.querySelectorAll('.dc.sel').forEach(el=>el.classList.remove('sel'));
  const c=document.querySelector(`.dc[data-d="${d}"][data-y="${y}"][data-m="${m}"]`);
  if(c) c.classList.add('sel');
  const dn=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  const si=document.getElementById('si');
  si.textContent=`${dn[new Date(y,m,d).getDay()]} ${d} de ${MN[m]}`;
  si.classList.add('on');
  setTimeout(()=>si.classList.remove('on'),2300);
}

function goBack(){
  if(!hist.length){toast('Ya estás en el mes más antiguo');return}
  const p=hist.pop();cY=p.y;cM=p.m;sY=cY;sM=cM;sD=1;
  build();toast('↺ '+MN[cM]+' '+cY);
}

function openP(t){
  if(sD===null){toast('Toca un día primero');return}
  closeAll();
  const k=key(sY,sM,sD),e=cal[k]||{};
  const ds=`${sD} de ${MN[sM]} ${sY}`;
  if(t==='nota'){
    document.getElementById('ntit').textContent='Nota · '+ds;
    document.getElementById('ntxt').value=e.nota||'';
    document.getElementById('pnota').classList.add('open');
  } else if(t==='color'){
    document.getElementById('ctit').textContent='Resaltar · '+ds;
    document.getElementById('cgrid').innerHTML=COLS.map(c=>`<div class="sw${e.color===c?' sel':''}" style="background:${c}" onclick="saveColor('${c}')"></div>`).join('');
    document.getElementById('pcolor').classList.add('open');
  } else if(t==='emoji'){
    document.getElementById('etit').textContent='Emoji · '+ds;
    document.getElementById('egrid').innerHTML=EMJS.map(em=>`<button class="eb" onclick="saveEmoji('${em}')">${em}</button>`).join('');
    document.getElementById('pemoji').classList.add('open');
  }
  document.getElementById('ov').classList.add('on');
}

function closeAll(){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('open'));
  document.getElementById('ov').classList.remove('on');
}

function refreshCell(y,m,d){
  const c=document.querySelector(`.dc[data-d="${d}"][data-y="${y}"][data-m="${m}"]`);
  if(!c) return;
  const k=key(y,m,d),e=cal[k]||{};
  c.style.background=e.color?e.color+'22':'';
  let mk='';
  if(e.nota) mk+=`<span class="dot" style="background:#c9837a"></span>`;
  if(e.color) mk+=`<span class="dot" style="background:${e.color}"></span>`;
  if(e.emoji) mk+=`<span class="em">${e.emoji}</span>`;
  const dm=c.querySelector('.dm');
  if(dm) dm.innerHTML=mk;
}

function saveNota(){
  const k=key(sY,sM,sD),v=document.getElementById('ntxt').value.trim();
  if(!cal[k]) cal[k]={};
  if(v) cal[k].nota=v; else delete cal[k].nota;
  save();closeAll();refreshCell(sY,sM,sD);toast('Nota guardada ✓');
}
function saveColor(c){
  const k=key(sY,sM,sD);
  if(!cal[k]) cal[k]={};
  cal[k].color=c;save();closeAll();refreshCell(sY,sM,sD);toast('Color aplicado ✓');
}
function clearColor(){
  const k=key(sY,sM,sD);
  if(cal[k]) delete cal[k].color;
  save();closeAll();refreshCell(sY,sM,sD);toast('Color quitado');
}
function saveEmoji(em){
  const k=key(sY,sM,sD);
  if(!cal[k]) cal[k]={};
  cal[k].emoji=em;save();closeAll();refreshCell(sY,sM,sD);toast(em+' añadido ✓');
}
function clearEmoji(){
  const k=key(sY,sM,sD);
  if(cal[k]) delete cal[k].emoji;
  save();closeAll();refreshCell(sY,sM,sD);toast('Emoji quitado');
}

let tt;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('on');
  clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('on'),1900);
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeAll()});
build();
</script>
</body>
</html>
