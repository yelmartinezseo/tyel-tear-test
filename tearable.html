<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>T-Yel</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#b8b4b0;font-family:'DM Sans',sans-serif;user-select:none}

#wrap{width:100vw;height:100vh;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* ── STAGE ── */
#stage{flex:1;position:relative;overflow:hidden;min-height:0}
.page{position:absolute;inset:0;display:flex;flex-direction:column;transform-origin:top center}
#pback{z-index:1}
#pfront{z-index:2}

/* ── HEADER ── */
.ph{padding:22px 26px 36px;flex-shrink:0}
.ph-f{background:#c9837a}
.ph-b{background:#8a9db5}
.ph h1{font-family:'Syne',sans-serif;font-size:clamp(40px,11vw,90px);font-weight:800;color:rgba(255,255,255,.94);line-height:1;letter-spacing:-2px}
.ph .yr{font-family:'Syne',sans-serif;font-size:13px;color:rgba(255,255,255,.58);margin-top:4px}

/* ── GRID ── */
.pgrid-wrap{flex:1;background:#c8c4c0;padding:8px 10px 2px;overflow:hidden}
.grid{display:grid;grid-template-columns:repeat(7,1fr)}
.ch{text-align:center;font-family:'Syne',sans-serif;font-size:clamp(13px,3.2vw,24px);font-weight:700;color:#7b7470;padding:4px 0 8px}
.ch.wk{color:#c9837a}

.dc{text-align:center;padding:3px 1px 4px;border-radius:8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;min-height:54px;transition:background .1s;position:relative}
.dc.emp{pointer-events:none}
.dc:active{background:rgba(255,255,255,.3)}
.dn{font-family:'Syne',sans-serif;font-size:clamp(17px,4.2vw,40px);font-weight:700;color:#1a1612;line-height:1.05;position:relative;z-index:1}
.dc.wk .dn{color:#c9837a}

/* today: número en círculo rosa */
.dc.tod .dn{
  background:#c9837a;color:#fff;border-radius:50%;
  width:clamp(28px,5.5vw,44px);height:clamp(28px,5.5vw,44px);
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(13px,3.2vw,28px)
}

/* sel: borde, sin tocar el círculo del today */
.dc.sel{outline:2.5px solid #c9837a;outline-offset:-1px;border-radius:8px}

/* colored bg on cell */
.dc.colored{border-radius:8px}

/* markers row: solo nota y emoji, NO color */
.dm{display:flex;gap:3px;flex-wrap:wrap;justify-content:center;min-height:10px;margin-top:2px}
.dot-nota{width:6px;height:6px;border-radius:50%;background:#c9837a;flex-shrink:0}
.em{font-size:10px;line-height:1}

/* ── BAR ── */
#bar{
  background:#f4f0ed;
  display:flex;align-items:center;justify-content:space-around;
  padding:10px 8px 16px;
  border-top:1px solid rgba(0,0,0,.09);
  flex-shrink:0;z-index:5
}
.bb{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:pointer;padding:4px 10px;border-radius:12px;transition:background .1s}
.bb:active{background:rgba(0,0,0,.07)}
.bi{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;font-style:normal}
.bl{font-size:11px;font-weight:500;color:#7b7470}

/* ── OVERLAY ── */
#ov{display:none;position:absolute;inset:0;background:rgba(8,6,4,.56);z-index:20}
#ov.on{display:block}

/* ── PANELS ── */
.panel{
  position:absolute;bottom:-110%;left:0;right:0;
  background:#faf8f6;border-radius:22px 22px 0 0;
  padding:16px 18px 28px;
  z-index:30;
  transition:bottom .34s cubic-bezier(.22,.8,.22,1);
  max-height:82%;overflow-y:auto
}
.panel.open{bottom:0}
.phan{width:38px;height:4px;background:rgba(0,0,0,.14);border-radius:2px;margin:0 auto 16px}

/* HEADER ROW inside panel */
.ph-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.ptit{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#999}
.pcl{
  background:#e8e4e0;border:none;border-radius:50%;
  width:30px;height:30px;font-size:16px;line-height:30px;text-align:center;
  cursor:pointer;color:#444;flex-shrink:0;display:flex;align-items:center;justify-content:center
}

/* DAY SELECTOR inside panel */
.day-sel-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:10px 12px;background:#f0ece8;border-radius:12px}
.day-sel-lbl{font-size:12px;color:#888;font-weight:500;flex-shrink:0}
.day-sel-val{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:#1a1612;flex:1}
.day-sel-btns{display:flex;gap:6px}
.day-sel-btn{background:#fff;border:1px solid rgba(0,0,0,.12);border-radius:8px;padding:5px 10px;font-size:12px;font-weight:500;cursor:pointer;color:#444;white-space:nowrap}
.day-sel-btn:active{background:#f0ece8}

/* NOTA */
textarea{width:100%;min-height:90px;border:1.5px solid rgba(0,0,0,.12);border-radius:10px;padding:10px 12px;font-size:14px;color:#1a1612;background:#fff;resize:none;outline:none;font-family:'DM Sans',sans-serif}
textarea:focus{border-color:#c9837a}
.sbtn{width:100%;margin-top:10px;padding:13px;background:#c9837a;color:#fff;border:none;border-radius:10px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer}
.sbtn:active{opacity:.85}
.delbtn{width:100%;margin-top:8px;padding:11px;background:rgba(0,0,0,.06);color:#c9837a;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer}

/* COLOR */
.cgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:12px}
.sw{border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform .12s,border-color .12s;aspect-ratio:1;max-width:46px;width:100%;margin:0 auto;display:block}
.sw:active{transform:scale(1.12)}
.sw.sel{border-color:#1a1612}
.xbtn{width:100%;padding:11px;background:rgba(0,0,0,.06);color:#666;border:none;border-radius:10px;font-size:13px;cursor:pointer}

/* EMOJI */
.egrid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.eb{background:rgba(0,0,0,.04);border:none;border-radius:10px;padding:9px 4px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .1s}
.eb:active{background:rgba(0,0,0,.12)}
/* current emoji display */
.cur-emoji{text-align:center;font-size:28px;margin-bottom:10px;min-height:36px}

/* TOAST */
#toast{position:absolute;bottom:82px;left:50%;transform:translateX(-50%) translateY(12px);background:#1a1612;color:#fff;padding:8px 18px;border-radius:40px;font-size:12px;font-weight:500;opacity:0;transition:opacity .2s,transform .2s;z-index:50;pointer-events:none;white-space:nowrap}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* SELINFO */
#si{position:absolute;top:10px;right:10px;background:rgba(201,131,122,.92);color:#fff;padding:5px 12px;border-radius:30px;font-size:11px;font-weight:700;z-index:15;pointer-events:none;opacity:0;transition:opacity .22s}
#si.on{opacity:1}

/* HINT */
#hint{position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);background:rgba(201,131,122,.88);color:#fff;padding:9px 20px;border-radius:30px;font-size:12px;font-weight:700;pointer-events:none;opacity:0;transition:opacity .3s;z-index:12;white-space:nowrap;text-align:center}
#hint.on{opacity:1}
</style>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <div class="page" id="pback"></div>
    <div class="page" id="pfront"></div>
    <!-- zona de drag: cubre solo la cabecera, encima de todo excepto paneles -->
    <div id="dragzone" style="position:absolute;top:0;left:0;right:0;height:200px;z-index:10;cursor:ns-resize;touch-action:none;"></div>

    <div id="ov" onclick="closeAll()"></div>
    <div id="si"></div>
    <div id="hint">Arrastra la cabecera hacia arriba ↑</div>

    <!-- PANEL NOTA -->
    <div class="panel" id="pnota">
      <div class="phan"></div>
      <div class="ph-row">
        <div class="ptit" id="ntit">Nota</div>
        <button class="pcl" onclick="closeAll()">✕</button>
      </div>
      <div class="day-sel-row">
        <span class="day-sel-lbl">Día:</span>
        <span class="day-sel-val" id="nday">—</span>
        <div class="day-sel-btns">
          <button class="day-sel-btn" onclick="shiftDay('nota',-1)">‹ Ant</button>
          <button class="day-sel-btn" onclick="shiftDay('nota',1)">Sig ›</button>
        </div>
      </div>
      <textarea id="ntxt" placeholder="Escribe tu nota..."></textarea>
      <button class="sbtn" onclick="saveNota()">Guardar nota</button>
      <button class="delbtn" onclick="deleteNota()">Borrar nota de este día</button>
    </div>

    <!-- PANEL COLOR -->
    <div class="panel" id="pcolor">
      <div class="phan"></div>
      <div class="ph-row">
        <div class="ptit" id="ctit">Color</div>
        <button class="pcl" onclick="closeAll()">✕</button>
      </div>
      <div class="day-sel-row">
        <span class="day-sel-lbl">Día:</span>
        <span class="day-sel-val" id="cday">—</span>
        <div class="day-sel-btns">
          <button class="day-sel-btn" onclick="shiftDay('color',-1)">‹ Ant</button>
          <button class="day-sel-btn" onclick="shiftDay('color',1)">Sig ›</button>
        </div>
      </div>
      <div class="cgrid" id="cgrid"></div>
      <button class="xbtn" onclick="clearColor()">Quitar color de este día</button>
    </div>

    <!-- PANEL EMOJI -->
    <div class="panel" id="pemoji">
      <div class="phan"></div>
      <div class="ph-row">
        <div class="ptit" id="etit">Emoji</div>
        <button class="pcl" onclick="closeAll()">✕</button>
      </div>
      <div class="day-sel-row">
        <span class="day-sel-lbl">Día:</span>
        <span class="day-sel-val" id="eday">—</span>
        <div class="day-sel-btns">
          <button class="day-sel-btn" onclick="shiftDay('emoji',-1)">‹ Ant</button>
          <button class="day-sel-btn" onclick="shiftDay('emoji',1)">Sig ›</button>
        </div>
      </div>
      <div class="cur-emoji" id="curemoji"></div>
      <div class="egrid" id="egrid"></div>
      <button class="xbtn" style="margin-top:10px" onclick="clearEmoji()">Quitar emoji de este día</button>
    </div>

    <div id="toast"></div>
  </div>

  <!-- BAR is outside #stage so it's always visible -->
  <div id="bar">
    <button class="bb" onclick="openP('nota')">
      <i class="bi" style="background:#c9837a">✎</i><span class="bl">Nota</span>
    </button>
    <button class="bb" onclick="openP('color')">
      <i class="bi" style="background:#7ab4c9">◈</i><span class="bl">Color</span>
    </button>
    <button class="bb" onclick="openP('emoji')">
      <i class="bi" style="background:#9b7ac9">☺</i><span class="bl">Emoji</span>
    </button>
    <button class="bb" onclick="goBack()">
      <i class="bi" style="background:#7ac99b">↺</i><span class="bl">Volver</span>
    </button>
  </div>
</div>

<script>
'use strict';
const MN=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DN=['D','L','M','X','J','V','S'];
const DNS=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
const COLS=['#FFD93D','#FF9A3C','#FF7878','#FF4C6A','#C47ED6','#7A6FD8','#5B9BF0','#3AC569','#2BD4C4','#888888'];
const EMJS=['⭐','❤️','🎯','✅','⚠️','💡','🎉','📅','🔔','🎂','💬','✏️','🏃','💪','🍎','☕','🌙','✨','🌱','📌','🔥','🎵','📝','🏆'];

const now=new Date();
let cY=now.getFullYear(),cM=now.getMonth();
// panel-specific day selection (independent of drag)
let pDay={nota:now.getDate(),color:now.getDate(),emoji:now.getDate()};
let pYear={nota:cY,color:cY,emoji:cY};
let pMonth={nota:cM,color:cM,emoji:cM};

let hist=[];
let cal={};
try{cal=JSON.parse(localStorage.getItem('tyc4')||'{}')}catch(e){}
const persist=()=>{try{localStorage.setItem('tyc4',JSON.stringify(cal))}catch(e){}};
const key=(y,m,d)=>`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const daysIn=(y,m)=>new Date(y,m+1,0).getDate();
const dayName=(y,m,d)=>DNS[new Date(y,m,d).getDay()];
const fullDate=(y,m,d)=>`${dayName(y,m,d)} ${d} de ${MN[m]} ${y}`;

// ── BUILD ────────────────────────────────────────────────────────────────────
function buildCal(y,m,el,isfront){
  const fd=new Date(y,m,1).getDay();
  const nd=daysIn(y,m);
  const isnow=(y===now.getFullYear()&&m===now.getMonth());
  let h=`<div class="ph ${isfront?'ph-f':'ph-b'}"><h1>${MN[m]}</h1><div class="yr">${y}</div></div>`;
  h+=`<div class="pgrid-wrap"><div class="grid">`;
  DN.forEach((d,i)=>h+=`<div class="ch${(i===0||i===6)?' wk':''}">${d}</div>`);
  for(let i=0;i<fd;i++) h+=`<div class="dc emp"></div>`;
  for(let d=1;d<=nd;d++){
    const dow=(fd+d-1)%7,wk=dow===0||dow===6;
    const tod=isnow&&d===now.getDate();
    const k=key(y,m,d);
    const e=cal[k]||{};
    const bg=e.color?`style="background:${e.color}55"`:'';
    let mk='';
    if(e.nota) mk+=`<span class="dot-nota"></span>`;
    if(e.emoji) mk+=`<span class="em">${e.emoji}</span>`;
    const cls=['dc',wk&&'wk',tod&&'tod',e.color&&'colored'].filter(Boolean).join(' ');
    h+=`<div class="${cls}" ${bg} data-d="${d}" data-y="${y}" data-m="${m}" onclick="tapDay(${d},${y},${m})">`
      +`<div class="dn">${d}</div>`
      +`<div class="dm">${mk}</div>`
      +`</div>`;
  }
  h+=`</div></div>`;
  el.innerHTML=h;
}

function build(){
  const pm=cM===0?11:cM-1,py=cM===0?cY-1:cY;
  buildCal(py,pm,document.getElementById('pback'),false);
  buildCal(cY,cM,document.getElementById('pfront'),true);
  const pf=document.getElementById('pfront');
  pf.style.cssText='z-index:2;transform:none;transition:none';
  // Ajustar dragzone al tamaño real del header tras paint
  requestAnimationFrame(()=>{
    const hdr=document.querySelector('#pfront .ph');
    if(hdr){
      document.getElementById('dragzone').style.height=hdr.offsetHeight+'px';
    }
  });
  const h=document.getElementById('hint');
  h.classList.add('on');
  setTimeout(()=>h.classList.remove('on'),2400);
}

// ── DRAG / TEAR ──────────────────────────────────────────────────────────────
let drag=false,sy=0,torn=false,busy=false;

function gy(e){return e.touches?e.touches[0].clientY:e.clientY}
function pf(){return document.getElementById('pfront')}




document.addEventListener('mousemove',moveD);
document.addEventListener('touchmove',moveD,{passive:false});
document.addEventListener('mouseup',endD);
document.addEventListener('touchend',endD);

// Dragzone: div fijo sobre la cabecera
const dz=document.getElementById('dragzone');
dz.addEventListener('mousedown',startD);
dz.addEventListener('touchstart',startD,{passive:false});

function startD(e){
  if(torn||busy) return;
  drag=true; sy=gy(e);
  pf().style.transition='none';
  if(e.cancelable) e.preventDefault();
}
function moveD(e){
  if(!drag||torn||busy) return;
  const delta=Math.max(0,sy-gy(e));
  const ang=Math.min(delta/(window.innerHeight*0.55),1)*172;
  pf().style.transform=`perspective(850px) rotateX(${ang}deg)`;
  if(e.cancelable) e.preventDefault();
}
function endD(){
  if(!drag||torn||busy) return;
  drag=false;
  const m=pf().style.transform.match(/rotateX\(([0-9.]+)deg\)/);
  const ang=m?parseFloat(m[1]):0;
  if(ang>60){
    busy=true; torn=true;
    pf().style.transition='transform .44s cubic-bezier(.4,0,.6,1)';
    pf().style.transform='perspective(850px) rotateX(180deg) translateY(-100%)';
    setTimeout(()=>{
      hist.push({y:cY,m:cM});
      cM++;if(cM>11){cM=0;cY++;}
      // reset panel days to 1st of new month
      ['nota','color','emoji'].forEach(t=>{pDay[t]=1;pYear[t]=cY;pMonth[t]=cM;});
      build(); toast(`${MN[cM]} ${cY}`);
    },460);
  } else {
    pf().style.transition='transform .28s ease-out';
    pf().style.transform='none';
  }
}

// ── TAP DAY ──────────────────────────────────────────────────────────────────
function tapDay(d,y,m){
  if(document.querySelector('.panel.open')) return;
  // set all panels to this day
  ['nota','color','emoji'].forEach(t=>{pDay[t]=d;pYear[t]=y;pMonth[t]=m;});
  highlightCell(d,y,m);
  const si=document.getElementById('si');
  si.textContent=fullDate(y,m,d);
  si.classList.add('on');
  setTimeout(()=>si.classList.remove('on'),2400);
}

function highlightCell(d,y,m){
  document.querySelectorAll('.dc.sel').forEach(el=>el.classList.remove('sel'));
  const c=document.querySelector(`.dc[data-d="${d}"][data-y="${y}"][data-m="${m}"]`);
  if(c) c.classList.add('sel');
}

// ── VOLVER ───────────────────────────────────────────────────────────────────
function goBack(){
  if(!hist.length){toast('Ya estás en el primer mes');return}
  const p=hist.pop();cY=p.y;cM=p.m;
  ['nota','color','emoji'].forEach(t=>{pDay[t]=1;pYear[t]=cY;pMonth[t]=cM;});
  build(); toast('↺ '+MN[cM]+' '+cY);
}

// ── PANEL OPEN ───────────────────────────────────────────────────────────────
function openP(type){
  closeAll();
  refreshPanelDay(type);
  document.getElementById('p'+type).classList.add('open');
  document.getElementById('ov').classList.add('on');
  if(type==='nota'){
    const k=key(pYear.nota,pMonth.nota,pDay.nota);
    document.getElementById('ntxt').value=(cal[k]&&cal[k].nota)||'';
    setTimeout(()=>document.getElementById('ntxt').focus(),350);
  }
  if(type==='emoji') renderCurEmoji();
}

function refreshPanelDay(type){
  const nd=fullDate(pYear[type],pMonth[type],pDay[type]);
  if(type==='nota'){
    document.getElementById('ntit').textContent='Nota · '+MN[pMonth.nota]+' '+pYear.nota;
    document.getElementById('nday').textContent=nd;
  } else if(type==='color'){
    document.getElementById('ctit').textContent='Color · '+MN[pMonth.color]+' '+pYear.color;
    document.getElementById('cday').textContent=nd;
    const k=key(pYear.color,pMonth.color,pDay.color);
    const cur=(cal[k]&&cal[k].color)||'';
    document.getElementById('cgrid').innerHTML=COLS.map(c=>
      `<div class="sw${cur===c?' sel':''}" style="background:${c}" onclick="saveColor('${c}')"></div>`
    ).join('');
  } else if(type==='emoji'){
    document.getElementById('etit').textContent='Emoji · '+MN[pMonth.emoji]+' '+pYear.emoji;
    document.getElementById('eday').textContent=nd;
    document.getElementById('egrid').innerHTML=EMJS.map(em=>
      `<button class="eb" onclick="saveEmoji('${em}')">${em}</button>`
    ).join('');
    renderCurEmoji();
  }
}

function renderCurEmoji(){
  const k=key(pYear.emoji,pMonth.emoji,pDay.emoji);
  const em=(cal[k]&&cal[k].emoji)||'';
  document.getElementById('curemoji').textContent=em;
}

// Shift day within panel (navigate days without closing)
function shiftDay(type,delta){
  let d=pDay[type],m=pMonth[type],y=pYear[type];
  d+=delta;
  if(d<1){
    m--;if(m<0){m=11;y--;}
    d=daysIn(y,m);
  } else if(d>daysIn(y,m)){
    m++;if(m>11){m=0;y++;}
    d=1;
  }
  pDay[type]=d; pMonth[type]=m; pYear[type]=y;
  refreshPanelDay(type);
  if(type==='nota'){
    const k=key(y,m,d);
    document.getElementById('ntxt').value=(cal[k]&&cal[k].nota)||'';
  }
}

function closeAll(){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('open'));
  document.getElementById('ov').classList.remove('on');
}

// ── ACTIONS ──────────────────────────────────────────────────────────────────
function saveNota(){
  const y=pYear.nota,m=pMonth.nota,d=pDay.nota;
  const k=key(y,m,d);
  const v=document.getElementById('ntxt').value.trim();
  if(!cal[k]) cal[k]={};
  if(v) cal[k].nota=v; else delete cal[k].nota;
  persist(); closeAll(); refreshCell(y,m,d); toast('Nota guardada ✓');
}
function deleteNota(){
  const y=pYear.nota,m=pMonth.nota,d=pDay.nota;
  const k=key(y,m,d);
  if(cal[k]) delete cal[k].nota;
  persist(); closeAll(); refreshCell(y,m,d); toast('Nota borrada');
}
function saveColor(c){
  const y=pYear.color,m=pMonth.color,d=pDay.color;
  const k=key(y,m,d);
  if(!cal[k]) cal[k]={};
  cal[k].color=c; persist(); closeAll(); refreshCell(y,m,d); toast('Color aplicado ✓');
}
function clearColor(){
  const y=pYear.color,m=pMonth.color,d=pDay.color;
  const k=key(y,m,d);
  if(cal[k]) delete cal[k].color;
  persist(); closeAll(); refreshCell(y,m,d); toast('Color quitado');
}
function saveEmoji(em){
  const y=pYear.emoji,m=pMonth.emoji,d=pDay.emoji;
  const k=key(y,m,d);
  if(!cal[k]) cal[k]={};
  cal[k].emoji=em; persist(); closeAll(); refreshCell(y,m,d); toast(em+' añadido ✓');
}
function clearEmoji(){
  const y=pYear.emoji,m=pMonth.emoji,d=pDay.emoji;
  const k=key(y,m,d);
  if(cal[k]) delete cal[k].emoji;
  persist(); closeAll(); refreshCell(y,m,d); toast('Emoji quitado');
}

// ── REFRESH CELL ─────────────────────────────────────────────────────────────
function refreshCell(y,m,d){
  const c=document.querySelector(`.dc[data-d="${d}"][data-y="${y}"][data-m="${m}"]`);
  if(!c) return;
  const k=key(y,m,d);
  const e=cal[k]||{};
  // background color (full cell)
  c.style.background=e.color?e.color+'55':'';
  // toggle colored class
  if(e.color) c.classList.add('colored'); else c.classList.remove('colored');
  // markers: nota dot + emoji only
  let mk='';
  if(e.nota) mk+=`<span class="dot-nota"></span>`;
  if(e.emoji) mk+=`<span class="em">${e.emoji}</span>`;
  const dm=c.querySelector('.dm');
  if(dm) dm.innerHTML=mk;
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
let tt;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('on');
  clearTimeout(tt); tt=setTimeout(()=>t.classList.remove('on'),1900);
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeAll()});
build();
</script>
</body>
